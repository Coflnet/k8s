apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: erpnext
spec:
  selector:
    matchLabels:
      app: adminer
  template:
    metadata:
      labels:
        app: adminer
    spec:
      containers:
      - name: adminer
        image: adminer:4.8.0
        resources:
          limits:
            memory: "128Mi"
            cpu: "100m"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: adminer-service
  namespace: erpnext
spec:
  selector:
    app: adminer
  ports:
  - port: 8080
    targetPort: 8080
