apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: ingress
  namespace: erpnext
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  rules:
  - host: erp.flou21.de
    http:
      paths:
      - path: /
        backend:
          serviceName: frappe-bench-0001-erpnext
          servicePort: 80
  - host: adminer-erpnext.flou21.de
    http:
      paths:
      - path: /
        backend:
          serviceName: adminer-service
          servicePort: 8080