# Leaderboard service — standalone chart (namespace: leaderboard).
# Deployed to both eu-cluster and talos-eu-hcloud via Fleet.

replicaCount: 1

strategy: RollingUpdate
image:
  repository: muehlhansfl/leaderboard
  # Updated automatically by CI (container-ci.yml) on push to main.
  tag: de0cd8aae4422b0bfbee69d38231dd4a3e965c1c
  pullPolicy: IfNotPresent

ports:
  - name: api
    containerPort: 8000

resources:
  requests:
    cpu: 400m
    memory: 200Mi

serivcePorts:
  - name: api
    port: 8000
    targetPort: 8000

readinessProbe:
  httpGet:
    path: /metrics
    port: api
  initialDelaySeconds: 40
  periodSeconds: 3

# ── Cassandra (ScyllaDB) via CoflnetCore.AddCassandra() ──────────────────
# Reads the CASSANDRA config section. KEYSPACE is mandatory (throws on null).
# Host and credentials come from the shared scylla-config / scylla-credentials
# k8s resources that already exist in the sky namespace on both clusters.
# The leaderboard_user and leaderboard_password keys must be added to those
# resources before deployment — see the checklist in fleet/fleet/leaderboard.yaml.
#
# OpenBao fallback: if OPENBAO__ENABLED=true and the OpenBao kv/sky/leaderboard
# path is populated, the CASSANDRA__* env vars below act as k8s-secret fallback
# (OpenBao takes precedence via AddOpenBaoFromEnvironment).

envVars:
  # ── Cassandra (ScyllaDB mTLS) ────────────────────────────────────────
  - name: CASSANDRA__HOSTS
    valueFrom:
      configMapKeyRef:
        name: scylla-config
        key: scylla_host
  - name: CASSANDRA__USER
    valueFrom:
      configMapKeyRef:
        name: scylla-config
        key: leaderboard_user
  - name: CASSANDRA__PASSWORD
    valueFrom:
      secretKeyRef:
        name: scylla-credentials
        key: leaderboard_password
  - name: CASSANDRA__KEYSPACE
    value: leaderboards
  - name: CASSANDRA__X509Certificate_PATHS
    value: /tls/scylla/secret/db.pfx
  - name: CASSANDRA__X509Certificate_PASSWORD
    valueFrom:
      secretKeyRef:
        name: scylla-credentials
        key: db-pfx-password

  # ── Redis (sidecar in same pod via redis.yaml) ──────────────────────
  - name: REDIS_HOST
    value: redis

  # ── Kafka (mTLS) via CoflnetCore.AddKafka() ─────────────────────────
  # Reads the KAFKA config section. The sky namespace redpanda secrets
  # and configmaps already exist on both clusters.
  - name: KAFKA__BROKERS
    valueFrom:
      secretKeyRef:
        name: redpanda
        key: brokers
  - name: KAFKA__USERNAME
    valueFrom:
      secretKeyRef:
        name: redpanda-credentials
        key: username
  - name: KAFKA__PASSWORD
    valueFrom:
      secretKeyRef:
        name: redpanda-credentials
        key: password
  - name: KAFKA__TLS__CA_LOCATION
    value: /tls/cm/ca.crt
  - name: KAFKA__TLS__CERTIFICATE_LOCATION
    value: /tls/cm/skyblock.crt
  - name: KAFKA__TLS__KEY_LOCATION
    value: /tls/secret/skyblock.key

  # ── OpenTelemetry ───────────────────────────────────────────────────
  - name: OTEL_SERVICE_NAME
    value: leaderboard
  - name: JAEGER_SERVICE_NAME
    value: leaderboard
  - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
    value: "http://jaeger-collector.observability:4317"
  - name: OTEL_EXPORTER_OTLP_LOGS_ENDPOINT
    value: "http://loki-scalable-write.loki:3100/otlp/v1/logs"
  - name: LOCATION
    value: eu

# ── OpenBao configuration ──────────────────────────────────────────────
# These are rendered directly in the deployment template so they can use
# Helm templating for the path (includes .Chart.Name).
openbao:
  enabled: true
  optional: true
  addr: "http://openbao.openbao.svc:8200"
  mount: kv
  # path is set in the deployment template via helm (sky/{{ .Chart.Name }})
  role: leaderboard

# ── Volumes ────────────────────────────────────────────────────────────
volumes:
  # Kafka mTLS certificates (from redpanda configmap/secret in sky namespace)
  - name: kafka-ca
    mountName: kafka-cert
    mountPath: /tls/cm
    type: configmap
    sourceName: redpanda
  - name: kafka-key
    mountName: kafka-key
    mountPath: /tls/secret
    type: secret
    sourceName: redpanda
  # OpenBao CA certificate (for TLS verification, used when openbaoAddr is https)
  - name: openbao-ca
    mountName: openbao-tls
    mountPath: /openbao/tls
    type: configmap
    sourceName: openbao-ca
  # ScyllaDB mTLS client certificate
  - name: scylla-pfx
    mountName: scylla-pfx
    mountPath: /tls/scylla/secret/db.pfx
    subPath: db.pfx
    type: secret
    sourceName: scylla-pfx
