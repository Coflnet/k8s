apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.strategy }}
  progressDeadlineSeconds: 2592000
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      serviceAccountName: {{ .Chart.Name }}
      containers:
      - name: {{ .Chart.Name }}
        image: {{ .Values.image.repository }}:{{ .Values.image.tag  }}
        ports:
           {{ toYaml .Values.ports | nindent 10 }}
        env:
          # ── OpenBao configuration ──────────────────────────────────
          - name: OPENBAO__ENABLED
            value: {{ .Values.openbao.enabled | default true | quote }}
          - name: OPENBAO__OPTIONAL
            value: {{ .Values.openbao.optional | default true | quote }}
          - name: OPENBAO__ADDR
            value: {{ .Values.openbao.addr | default "http://openbao.openbao.svc:8200" }}
          - name: OPENBAO__MOUNT
            value: {{ .Values.openbao.mount | default "kv" }}
          - name: OPENBAO__PATH
            value: {{ printf "sky/%s" .Chart.Name | quote }}
          - name: OPENBAO__ROLE
            value: {{ .Values.openbao.role | default .Chart.Name | quote }}
          {{ if .Values.openbao.caCert }}
          - name: OPENBAO__CACERT
            value: /openbao/tls/ca.crt
          {{ end }}
          # ── Application env vars ───────────────────────────────────
          {{ toYaml .Values.envVars | nindent 10 }}
        readinessProbe:
          {{ toYaml .Values.readinessProbe | nindent 10 }}
        resources:
          {{ toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        {{ range .Values.volumes }}
        - name: {{ .name }}
          mountPath: {{ .mountPath }}
          {{ if .subPath }}
          subPath: {{ .subPath }}
          {{ end }}
        {{ end }}
      volumes:
      {{ range .Values.volumes }}
      - name: {{ .name }}
        {{ if eq .type "configmap" }}
        configMap:
          name: {{ .sourceName }}
        {{ else if eq .type "secret" }}
        secret:
          secretName: {{ .sourceName }}
          {{ if .subPath }}
          items:
          - key: {{ .subPath }}
            path: {{ .subPath }}
          {{ end }}
        {{ end }}
      {{ end }}
