apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.strategy }}
  progressDeadlineSeconds: 2592000
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      serviceAccountName: {{ .Chart.Name }}
      {{- if .Values.openbao.tokenAudience }}
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        image: {{ .Values.image.repository }}:{{ .Values.image.tag  }}
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          runAsNonRoot: true
          runAsUser: 999
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        ports:
           {{ toYaml .Values.ports | nindent 10 }}
        env:
          # ── OpenBao configuration ──────────────────────────────────
          - name: OPENBAO__ENABLED
            value: {{ .Values.openbao.enabled | default true | quote }}
          - name: OPENBAO__OPTIONAL
            value: {{ .Values.openbao.optional | quote }}
          - name: OPENBAO__ADDR
            value: {{ .Values.openbao.addr | default "http://openbao.openbao.svc:8200" }}
          - name: OPENBAO__MOUNT
            value: {{ .Values.openbao.mount | default "kv" }}
          - name: OPENBAO__PATH
            value: {{ printf "sky/%s" .Chart.Name | quote }}
          - name: OPENBAO__ROLE
            value: {{ .Values.openbao.role | default .Chart.Name | quote }}
          - name: OPENBAO__AUTH_PATH
            value: {{ .Values.openbao.authPath | default "kubernetes" | quote }}
          {{- if .Values.openbao.tokenAudience }}
          - name: OPENBAO__TOKEN_PATH
            value: /var/run/secrets/openbao/token
          {{- if .Values.openbao.tlsServerName }}
          - name: OPENBAO__TLS_SERVER_NAME
            value: {{ .Values.openbao.tlsServerName | quote }}
          {{- end }}
          - name: OPENBAO__REQUEST_TIMEOUT_SECONDS
            value: "5"
          - name: OPENBAO__STARTUP_RETRY_SECONDS
            value: "90"
          - name: OPENBAO__RETRY_DELAY_SECONDS
            value: "2"
          {{- end }}
          {{ if .Values.openbao.caCert }}
          - name: OPENBAO__CACERT
            value: /openbao/tls/ca.crt
          {{ end }}
          # ── Application env vars ───────────────────────────────────
          {{ toYaml .Values.envVars | nindent 10 }}
        readinessProbe:
          {{ toYaml .Values.readinessProbe | nindent 10 }}
        resources:
          {{ toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        {{- if .Values.openbao.tokenAudience }}
        - name: openbao-workload-token
          mountPath: /var/run/secrets/openbao
          readOnly: true
        {{- end }}
        {{ range .Values.volumes }}
        - name: {{ .name }}
          mountPath: {{ .mountPath }}
          {{ if .subPath }}
          subPath: {{ .subPath }}
          {{ end }}
        {{ end }}
      volumes:
      {{- if .Values.openbao.tokenAudience }}
      - name: openbao-workload-token
        projected:
          defaultMode: 0440
          sources:
            - serviceAccountToken:
                audience: {{ .Values.openbao.tokenAudience | quote }}
                expirationSeconds: 600
                path: token
      {{- end }}
      {{ range .Values.volumes }}
      - name: {{ .name }}
        {{ if eq .type "configmap" }}
        configMap:
          name: {{ .sourceName }}
        {{ else if eq .type "secret" }}
        secret:
          secretName: {{ .sourceName }}
          {{ if .subPath }}
          items:
          - key: {{ .subPath }}
            path: {{ .subPath }}
          {{ end }}
        {{ end }}
      {{ end }}
