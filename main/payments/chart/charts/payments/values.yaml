replicaCount: 2
maxUnavailable: 1

enabled: true

openbao:
  addr: https://openbao.openbao.svc:8200
  mount: kv
  optional: "false"
  tokenAudience: openbao
  tokenPath: /var/run/secrets/openbao-serviceaccount/token
  caSecretName: openbao-ca
  caBundlePath: /var/run/secrets/openbao-ca-bundle/ca-certificates.crt
  # Dynamic CockroachDB credentials via the OpenBao database secrets engine.
  # Disabled by default; enabled per-cluster (e.g. Talos) through a values overlay.
  # Uses a static role: stable username, OpenBao-rotated password supplied to
  # Npgsql at runtime so the connection pool stays intact.
  database:
    enabled: false
    mount: database
    credentialsKind: static
    refreshSeconds: 1800

security:
  kubernetesApiServiceCidr: 10.43.0.1/32

networkPolicy:
  # On Cilium clusters (e.g. Talos) the kube-apiserver egress rule is expressed
  # with the `kube-apiserver` entity instead of a hardcoded ClusterIP. Enable
  # via a values overlay; leave false on plain NetworkPolicy clusters.
  cilium:
    enabled: false
  publicIngressNamespaces:
    - nginx-ingress
    - ingress-nginx
  publicIngressCidrs:
    - 46.224.66.37/32
    - 46.224.68.6/32
    - 23.88.39.122/32
    - 49.13.132.87/32
    - 142.132.186.142/32
    - 10.42.38.64/32
    - 10.42.203.0/32
    - 10.42.226.64/32
    - 10.42.97.192/32
  paymentClientNamespaces:
    - sky
    - skyblock-bz
    - ane
    - discord
    - payment
  externalKafkaCidrs:
    - 195.201.60.99/32
    - 195.201.61.153/32
    - 195.201.61.227/32

strategy: RollingUpdate

image:
  repository: muehlhansfl/payments
  tag: 41a8f042-0141-4796-95d6-9296a8f4eebd
  pullPolicy: IfNotPresent

ports:
  - name: api
    containerPort: 8000

resources:
  requests:
    cpu: 50m
    memory: 300Mi
  limits:
    memory: 1Gi
serivcePorts:
  - name: api
    port: 8000
    targetPort: 8000

readinessProbe:
  httpGet:
    path: /migrationdone
    port: api
  initialDelaySeconds: 30
  periodSeconds: 3

envVars:
  - name: JAEGER_AGENT_HOST
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP

  - name: OTEL_EXPORTER_JAEGER_AGENT_HOST
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP

payments:
  - name: ane-payments
    envVars:
      - name: lemonsqueezy__STORE_ID
        value: "174444"
      - name: lemonsqueezy__SUBSCRIPTION_VARIANT_ID
        value: "805091"
      - name: KAFKA__TLS__CA_LOCATION
        value: "/tls/cm/ca.crt"

      - name: KAFKA__TLS__CERTIFICATE_LOCATION
        value: "/tls/cm/skyblock.crt"

      - name: KAFKA__TLS__KEY_LOCATION
        value: "/tls/secret/skyblock.key"

      - name: KAFKA__REPLICATION_FACTOR
        value: "3"
      - name: KAFKA__TRANSACTION_TOPIC__NAME
        value: "ane-transactions"
      - name: KAFKA__PAYMENT_TOPIC__NAME
        value: "ane-payments"

    volumes:
      - name: redpanda
        mountPath: /tls/secret
        type: secret
        mountName: redpanda-secret
      - name: redpanda
        mountPath: /tls/cm
        type: configmap
        mountName: redpanda-cm

    ingress:
      enabled: true
      nginx: true
      hosts:
        - host: ane.coflnet.com
          http:
            paths:
              - path: /callback/lemonsqueezy
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: ane-payments
                    port:
                      number: 8000
  - name: dash-payments
    envVars:
      - name: lemonsqueezy__STORE_ID
        value: "162363"
      - name: lemonsqueezy__SUBSCRIPTION_VARIANT_ID
        value: "726701"
    ingress:
      enabled: true
      nginx: true
      hosts:
        - host: dash.coflnet.com
          http:
            paths:
              - path: /callback/lemonsqueezy
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: dash-payments
                    port:
                      number: 8000
  - name: tab-payments
    envVars: []
    ingress:
      enabled: true
      nginx: true
      hosts:
        - host: tab.coflnet.com
          http:
            paths:
              - path: /callback/lemonsqueezy
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: tab-payments
                    port:
                      number: 8000

  - name: sky-payments
    envVars:
      - name: PAYPAL__IS_SANDBOX
        value: "false"
      - name: KAFKA_HOST
        value: k8-main-kafka-kafka.kafka.svc.cluster.local
      - name: KAFKA__TLS__CA_LOCATION
        value: "/tls/cm/ca.crt"

      - name: KAFKA__TLS__CERTIFICATE_LOCATION
        value: "/tls/cm/skyblock.crt"

      - name: KAFKA__TLS__KEY_LOCATION
        value: "/tls/secret/skyblock.key"

      - name: KAFKA__REPLICATION_FACTOR
        value: "3"
      - name: lemonsqueezy__SUBSCRIPTION_VARIANT_ID
        value: "502893"

    volumes:
      - name: redpanda
        mountPath: /tls/secret
        type: secret
        mountName: redpanda-secret
      - name: redpanda
        mountPath: /tls/cm
        type: configmap
        mountName: redpanda-cm
    ingress:
      enabled: true
      nginx: true
      hosts:
        - host: sky.coflnet.com
          http:
            paths:
              - path: /callback/stripe
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: sky-payments
                    port:
                      number: 8000
              - path: /callback/paypal
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: sky-payments
                    port:
                      number: 8000
              - path: /callback/lemonsqueezy
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: sky-payments
                    port:
                      number: 8000
              - path: /callback/googlepay
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: sky-payments
                    port:
                      number: 8000
              - path: /callback/coingate
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: sky-payments
                    port:
                      number: 8000
              - path: /Callback/coingate
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: sky-payments
                    port:
                      number: 8000
        - host: skyblock-backend.coflnet.com
          http:
            paths:
              - path: /callback/stripe
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: sky-payments
                    port:
                      number: 8000
              - path: /callback/paypal
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: sky-payments
                    port:
                      number: 8000
