{{- if and .Values.enabled .Values.openbao.database.enabled .Values.openbao.database.mtls.enabled }}
{{- if not .Values.openbao.database.mtls.rootCA }}
{{- fail "openbao.database.mtls.rootCA must contain the current CockroachDB server CA when mTLS is enabled" }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.openbao.database.mtls.rootCAConfigMapName | default "cockroachdb-server-ca" }}
data:
  ca.crt: |
{{ .Values.openbao.database.mtls.rootCA | nindent 4 }}
{{- range $p := .Values.payments }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $p.name }}-cockroachdb-client
spec:
  secretName: {{ $p.name }}-cockroachdb-client-tls
  commonName: {{ replace "-" "_" $p.name | quote }}
  duration: 24h
  renewBefore: 8h
  usages:
    - client auth
  privateKey:
    algorithm: ECDSA
    size: 384
    rotationPolicy: Always
  issuerRef:
    name: {{ printf "openbao-pki-cockroachdb-%s" $p.name }}
    kind: ClusterIssuer
    group: cert-manager.io
{{- end }}
{{- end }}
