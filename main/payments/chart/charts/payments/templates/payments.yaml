{{ if .Values.enabled }}
{{ range $p := .Values.payments }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $p.name }}
  labels:
    app: {{ $p.name }}
    "config.linkerd.io/skip-outbound-ports": "3304"
spec:
  selector:
    matchLabels:
      app: {{ $p.name }}
  replicas: {{ $.Values.replicaCount }}
  template:
    metadata:
      labels:
        app: {{ $p.name }}
        app.kubernetes.io/part-of: payments
        security.coflnet.com/k8s-api-access: "false"
        security.coflnet.com/public-http: "true"
      annotations:
        "config.linkerd.io/skip-outbound-ports": "3304"
        {{- if $.Values.openbao.agentEnabled }}
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ printf "payment-%s" $p.name | quote }}
        {{- with $.Values.openbao.agentAuthPath }}
        vault.hashicorp.com/auth-path: {{ . | quote }}
        {{- end }}
        vault.hashicorp.com/agent-service-account-token-volume-name: "openbao-token"
        vault.hashicorp.com/tls-secret: {{ $.Values.openbao.caSecretName | default "openbao-ca" | quote }}
        vault.hashicorp.com/ca-cert: "/vault/tls/ca.crt"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/secret-volume-path: "/var/run/secrets/openbao"
        vault.hashicorp.com/agent-inject-secret-payment.env: {{ printf "kv/data/payment/%s" $p.name | quote }}
        vault.hashicorp.com/agent-inject-template-payment.env: |
          {{`{{- with secret "`}}{{ printf "kv/data/payment/%s" $p.name }}{{`" -}}`}}
          {{`{{- range $key, $value := .Data.data }}`}}
          {{`export {{ $key }}="$(printf '%s' '{{ $value | base64Encode }}' | base64 -d)"`}}
          {{`{{- end }}`}}
          {{`{{- end }}`}}
        {{- if $.Values.redpanda.openbao.enabled }}
        vault.hashicorp.com/agent-inject-secret-ca.crt: "kv/data/payment/redpanda"
        vault.hashicorp.com/agent-inject-template-ca.crt: |
          {{`{{- with secret "kv/data/payment/redpanda" -}}{{ index .Data.data "ca.crt" }}{{- end -}}`}}
        vault.hashicorp.com/secret-volume-path-ca.crt: "/tls/cm"
        vault.hashicorp.com/agent-inject-secret-skyblock.crt: "kv/data/payment/redpanda"
        vault.hashicorp.com/agent-inject-template-skyblock.crt: |
          {{`{{- with secret "kv/data/payment/redpanda" -}}{{ index .Data.data "skyblock.crt" }}{{- end -}}`}}
        vault.hashicorp.com/secret-volume-path-skyblock.crt: "/tls/cm"
        vault.hashicorp.com/agent-inject-secret-skyblock.key: "kv/data/payment/redpanda"
        vault.hashicorp.com/agent-inject-template-skyblock.key: |
          {{`{{- with secret "kv/data/payment/redpanda" -}}{{ index .Data.data "skyblock.key" }}{{- end -}}`}}
        vault.hashicorp.com/secret-volume-path-skyblock.key: "/tls/secret"
        {{- end }}
        {{- end }}
    spec:
      serviceAccountName: {{ $p.name }}
      automountServiceAccountToken: {{ $.Values.automountServiceAccountToken | default false }}
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Build a conventional trust bundle for the pre-migration image. This
      # deliberately uses a shell-capable runtime-deps image; the Payments
      # application image remains chiseled and has no shell dependency.
      initContainers:
      - name: openbao-ca-bundle
        image: {{ $.Values.openbao.caBundleImage | default "mcr.microsoft.com/dotnet/runtime-deps:10.0-noble" | quote }}
        imagePullPolicy: IfNotPresent
        {{- with $.Values.initContainerSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        command: ["/bin/sh", "-ec"]
        args:
          - |
            bundle=""
            for candidate in /etc/ssl/certs/ca-certificates.crt /etc/ssl/cert.pem /etc/pki/tls/certs/ca-bundle.crt; do
              if [ -s "$candidate" ]; then
                bundle="$candidate"
                break
              fi
            done
            if [ -z "$bundle" ]; then
              echo "system CA bundle not found" >&2
              exit 1
            fi
            cat "$bundle" /openbao-ca/ca.crt > /openbao-bundle/ca-certificates.crt
        volumeMounts:
          - name: openbao-ca
            mountPath: /openbao-ca
            readOnly: true
          - name: openbao-ca-bundle
            mountPath: /openbao-bundle
      {{ if $.Values.global }}
      {{ if $.Values.global.imagePullSecrets }}
      imagePullSecrets:
      {{ toYaml $.Values.global.imagePullSecrets | nindent 8 }}
      {{ end }}
      {{ end }}
      containers:
      - name: {{ $p.name }}
        image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
        {{- with $.Values.containerSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        ports:
           {{ toYaml $.Values.ports | nindent 10 }}
        env:
          - name: OPENBAO__ENABLED
            value: "true"
          - name: OPENBAO__ADDR
            value: {{ $.Values.openbao.addr | default "https://openbao.openbao.svc:8200" | quote }}
          - name: OPENBAO__ROLE
            value: {{ printf "payment-%s" $p.name | quote }}
          {{- with $.Values.openbao.authPath }}
          - name: OPENBAO__AUTH_PATH
            value: {{ . | quote }}
          {{- end }}
          - name: OPENBAO__MOUNT
            value: {{ $.Values.openbao.mount | default "kv" | quote }}
          - name: OPENBAO__PATH
            value: {{ printf "payment/%s" $p.name | quote }}
          - name: OPENBAO__OPTIONAL
            value: {{ $.Values.openbao.optional | default "false" | quote }}
          - name: OPENBAO__TOKEN_PATH
            value: {{ $.Values.openbao.tokenPath | default "/var/run/secrets/openbao-serviceaccount/token" | quote }}
          # Legacy provider uses the combined system/OpenBao trust bundle.
          - name: SSL_CERT_FILE
            value: {{ $.Values.openbao.caBundlePath | default "/var/run/secrets/openbao-ca-bundle/ca-certificates.crt" | quote }}
          # Coflnet.Core and the database password provider load this CA directly.
          - name: OPENBAO__CACERT
            value: {{ $.Values.openbao.caCertPath | default "/var/run/secrets/openbao-ca/ca.crt" | quote }}
          {{- if $.Values.openbao.database.enabled }}
          - name: OPENBAO__DB__ENABLED
            value: "true"
          - name: OPENBAO__DB__MOUNT
            value: {{ $.Values.openbao.database.mount | default "database" | quote }}
          - name: OPENBAO__DB__ROLE
            value: {{ $p.dbRole | default (printf "payment-%s" $p.name) | quote }}
          - name: OPENBAO__DB__CREDENTIALS_KIND
            value: {{ $.Values.openbao.database.credentialsKind | default "static" | quote }}
          - name: OPENBAO__DB__REFRESH_SECONDS
            value: {{ $.Values.openbao.database.refreshSeconds | default "1800" | quote }}
          {{- if $.Values.openbao.database.mtls.enabled }}
          - name: OPENBAO__DB__MTLS__ENABLED
            value: "true"
          - name: OPENBAO__DB__MTLS__CLIENT_CERT_PATH
            value: {{ printf "%s/tls.crt" ($.Values.openbao.database.mtls.clientMountPath | default "/var/run/secrets/cockroachdb-client") | quote }}
          - name: OPENBAO__DB__MTLS__CLIENT_KEY_PATH
            value: {{ printf "%s/tls.key" ($.Values.openbao.database.mtls.clientMountPath | default "/var/run/secrets/cockroachdb-client") | quote }}
          - name: OPENBAO__DB__MTLS__ROOT_CERT_PATH
            value: {{ $.Values.openbao.database.mtls.rootCAPath | default "/var/run/secrets/cockroachdb-server-ca/ca.crt" | quote }}
          {{- end }}
          {{- end }}
          {{- if $.Values.envVars }}
          {{ toYaml $.Values.envVars | nindent 10 }}
          {{- end }}
          {{- if $p.envVars }}
          {{ toYaml $p.envVars | nindent 10 }}
          {{- end }}
        readinessProbe:
          {{ toYaml $.Values.readinessProbe | nindent 10 }}
        resources:
          {{ toYaml $.Values.resources | nindent 10 }}
        volumeMounts:
        - name: openbao-token
          mountPath: {{ trimSuffix "/token" ($.Values.openbao.tokenPath | default "/var/run/secrets/openbao-serviceaccount/token") | quote }}
          readOnly: true
        - name: openbao-ca
          mountPath: {{ dir ($.Values.openbao.caCertPath | default "/var/run/secrets/openbao-ca/ca.crt") | quote }}
          readOnly: true
        - name: openbao-ca-bundle
          mountPath: {{ dir ($.Values.openbao.caBundlePath | default "/var/run/secrets/openbao-ca-bundle/ca-certificates.crt") | quote }}
          readOnly: true
        {{- if and $.Values.openbao.database.enabled $.Values.openbao.database.mtls.enabled }}
        - name: cockroachdb-client-tls
          mountPath: {{ $.Values.openbao.database.mtls.clientMountPath | default "/var/run/secrets/cockroachdb-client" | quote }}
          readOnly: true
        - name: cockroachdb-server-ca
          mountPath: {{ dir ($.Values.openbao.database.mtls.rootCAPath | default "/var/run/secrets/cockroachdb-server-ca/ca.crt") | quote }}
          readOnly: true
        {{- end }}
        {{ if $p.volumes }}
        {{ range $p.volumes }}
        {{- if not (and $.Values.redpanda.openbao.enabled (eq .name "redpanda")) }}
        - name: {{ .mountName }}
          mountPath: {{ .mountPath }}
        {{- end }}
        {{ end }}
        {{ end }}
      volumes:
        - name: openbao-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: {{ $.Values.openbao.tokenAudience | default "openbao" | quote }}
                  expirationSeconds: 3600
                  path: token
        - name: openbao-ca
          secret:
            secretName: {{ $.Values.openbao.caSecretName | default "openbao-ca" | quote }}
        - name: openbao-ca-bundle
          emptyDir: {}
        {{- if and $.Values.openbao.database.enabled $.Values.openbao.database.mtls.enabled }}
        - name: cockroachdb-client-tls
          secret:
            secretName: {{ printf "%s-cockroachdb-client-tls" $p.name | quote }}
        - name: cockroachdb-server-ca
          configMap:
            name: {{ $.Values.openbao.database.mtls.rootCAConfigMapName | default "cockroachdb-server-ca" | quote }}
        {{- end }}
      {{ if $p.volumes }}
      {{ range $p.volumes }}
        {{- if not (and $.Values.redpanda.openbao.enabled (eq .name "redpanda")) }}
        - name: {{ .mountName }}
          {{ if eq .type "configmap"  }}
          configMap:
            name: {{ .name }}
          {{ else }}
          secret:
            secretName: {{ .name }}
          {{ end }}
        {{- end }}
      {{ end }}
      {{ end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $p.name }}
  labels:
    app.kubernetes.io/part-of: payments
automountServiceAccountToken: true
---
{{ end }}
{{ end }}
