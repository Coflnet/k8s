# Talos (Hetzner) overlay for the payments umbrella chart.
#
# Differences vs. the eu-cluster defaults:
#   - CockroachDB credentials are issued dynamically by OpenBao (static role:
#     stable username, rotated password) instead of a static password baked
#     into kv/payment/<svc>.
#   - The kube-apiserver egress rule is expressed with the Cilium
#     `kube-apiserver` entity instead of a hardcoded ClusterIP.
#   - Ingress source IPs are matched via the ingress-controller namespace
#     selector rather than hardcoded eu-cluster pod CIDRs.
global:
  imagePullSecrets:
    - name: harbor

payments:
  enabled: true
  automountServiceAccountToken: false
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1654
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  initContainerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1654
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  openbao:
    agentEnabled: true
    # Talos OpenBao serves a different CA than eu-cluster (its TLS material was
    # generated on Talos, not part of the restored raft backup). Override the
    # default eu CA so the OpenBao agent can verify the Talos server cert.
