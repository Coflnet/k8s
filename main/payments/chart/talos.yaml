# Talos (Hetzner) overlay for the payments umbrella chart.
#
# Differences vs. the eu-cluster defaults:
#   - CockroachDB credentials are issued dynamically by OpenBao (static role:
#     stable username, rotated password) instead of a static password baked
#     into kv/payment/<svc>.
#   - The kube-apiserver egress rule is expressed with the Cilium
#     `kube-apiserver` entity instead of a hardcoded ClusterIP.
#   - Ingress source IPs are matched via the ingress-controller namespace
#     selector rather than hardcoded eu-cluster pod CIDRs.
global:
  imagePullSecrets:
    - name: harbor

payments:
  enabled: true
  openbao:
    # Talos OpenBao serves a different CA than eu-cluster (its TLS material was
    # generated on Talos, not part of the restored raft backup). Override the
    # default eu CA so the OpenBao agent can verify the Talos server cert.
    caCert: |
      -----BEGIN CERTIFICATE-----
      MIIBbTCCARSgAwIBAgIUFjyDQv3FGn29svU0l0fMAYJW77kwCgYIKoZIzj0EAwIw
      FTETMBEGA1UEAxMKb3BlbmJhby1jYTAeFw0yNjA1MzAwNjMwMDdaFw0zNjA1Mjcw
      NjMwMDdaMBUxEzARBgNVBAMTCm9wZW5iYW8tY2EwWTATBgcqhkjOPQIBBggqhkjO
      PQMBBwNCAATP+OVpqk8lnHealoOSbRZpInlL4ypSkvSCR0ksELx2Xg/eJJY3y9gj
      tRrEp6OXd24Wwoy2L4V74FkfO+dkfUTko0IwQDAOBgNVHQ8BAf8EBAMCAqQwDwYD
      VR0TAQH/BAUwAwEB/zAdBgNVHQ4EFgQUTs+GuzkdJhBXyXXlwZI7Mn3pr8gwCgYI
      KoZIzj0EAwIDRwAwRAIgA1l0MK0v3oIhoVgys1U/jdVZig/jp/SMhGJTilO25FkC
      IDcNtGjLm4jxvXj9MrrNBwICv2XvSscsE/nc8Je3zE8D
      -----END CERTIFICATE-----
    database:
      enabled: true
      mount: database
      credentialsKind: static
      refreshSeconds: 1800
  # Redpanda mTLS cert/key/ca injected by OpenBao from kv/payment/redpanda
  # instead of the in-cluster `redpanda` Secret/ConfigMap.
  redpanda:
    openbao:
      enabled: true
  networkPolicy:
    cilium:
      enabled: true
    # Rely on the ingress-controller namespace selector instead of the
    # eu-cluster pod CIDRs (which do not exist on Talos).
    publicIngressCidrs: []

accounting:
  enabled: false

product-provisioner:
  enabled: false
