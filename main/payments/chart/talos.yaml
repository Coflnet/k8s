  # Redpanda mTLS cert/key/ca injected by OpenBao from kv/payment/redpanda
  # instead of the in-cluster `redpanda` Secret/ConfigMap.
  redpanda:
    openbao:
      enabled: true
  networkPolicy:
    cilium:
      enabled: true
    # Exact, additive path to the tailnet proxy for the secrets cluster. This
    # changes only NetworkPolicy and does not roll the Payments Deployments.
    tailscaleOpenbaoEgress:
      enabled: true
    # Rely on the ingress-controller namespace selector instead of the
    # eu-cluster pod CIDRs (which do not exist on Talos).
    publicIngressCidrs: []

accounting:
  enabled: false

product-provisioner:
  enabled: false
