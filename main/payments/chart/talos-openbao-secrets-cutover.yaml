# Dormant cutover overlay. Do not add this file to fleet.yaml until the target
# jwt-talos-eu roles have been verified and the source OpenBao is frozen.
payments:
  openbao:
    # Application JWT login mount (the client prepends auth/ internally).
    authPath: jwt-talos-eu
    # OpenBao injector expects the API mount path including auth/.
    agentAuthPath: auth/jwt-talos-eu
