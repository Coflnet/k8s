defaultNamespace: payment
helm:
  chart: ./chart

targetCustomizations:
  - name: us-cluster
    clusterName: us-cluster
    helm:
      valuesFiles:
        - ./chart/us.yaml
  - name: talos-eu-hcloud
    clusterName: talos-eu-hcloud
    helm:
      valuesFiles:
        - ./chart/talos.yaml
        - ./chart/talos-openbao-secrets-cutover.yaml
