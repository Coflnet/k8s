defaultNamespace: payment
helm:
  chart: ./chart

targetCustomizations:
  - name: us-cluster
    clusterName: us-cluster
    helm:
      valuesFiles:
        - ./chart/us.yaml
  - name: talos-eu-hcloud
    clusterSelector:
      matchLabels:
        management.cattle.io/cluster-display-name: talos-eu-worker1
    helm:
      valuesFiles:
        - ./chart/talos.yaml