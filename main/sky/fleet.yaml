defaultNamespace: sky

# Argo Rollouts and Cilium EndpointSlice controllers modify resources at runtime.
# Strip the fields they change so Fleet doesn't see phantom drift and block deploys.
diff:
  comparePatches:
    - apiVersion: argoproj.io/v1alpha1
      kind: Rollout
      operations:
        - op: remove
          path: /status
        - op: remove
          path: /spec/strategy/canary/dynamicStableScale
        - op: remove
          path: /spec/template/metadata/annotations/rollouts.argoproj.io~1pod-template-hash
    - apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      operations:
        - op: remove
          path: /endpoints
    - apiVersion: v1
      kind: Service
      operations:
        - op: remove
          path: /spec/selector

helm:
  chart: ./chart
  # Argo Rollouts' controller takes Update-ownership of atomic fields on the resources
  # it manages: Rollout .spec.template.spec.containers and .spec.strategy.canary.steps
  # (the embedded PodTemplateSpec/steps are atomic lists in the CRD), plus Service
  # .spec.selector (it injects rollouts-pod-template-hash). Fleet v0.15.2 ships Helm v4,
  # which defaults to server-side apply, so every reconcile fails with
  # "conflict ... with rollouts-controller" and the deploy retries forever.
  # `force: true` is the only fleet.yaml lever in v0.15.2 that disables SSA on upgrade
  # (helmdeployer sets ForceReplace -> ServerSideApply=false -> client-side replace), so
  # Fleet and the rollouts controller stop fighting over field ownership. The
  # comparePatches above keep the controller's runtime mutations from registering as drift.
  force: true
  values:
    clusterName: global.fleet.clusterLabels.management.cattle.io/cluster-display-name
  valuesFiles:
    - ./chart/eu.yaml
targetCustomizations:
  - name: talos-cloudfanatic
    clusterName: talos-cloudfanatic
    helm:
      valuesFiles:
        - ./chart/talos-cloudfanatic.yaml
  - name: us-spot-cluster
    clusterName: us-spot-cluster
    helm:
      valuesFiles:
        - ./chart/us-spot-cluster.yaml
  - name: us-spot-hetzner
    clusterName: us-spot-hetzner
    helm:
      valuesFiles:
        - ./chart/us-spot-cluster.yaml
  - name: us-spot-contabo
    clusterName: us-spot-contabo
    helm:
      valuesFiles:
        - ./chart/us-spot-cluster.yaml
  - name: us-spot-gt-torronto
    clusterName: us-spot-gt-torronto
    helm:
      valuesFiles:
        - ./chart/us-spot-cluster.yaml
  # us-data-wagon was reinstalled as a Talos cluster; Rancher/Fleet still knows it
  # by its original registered cluster name "us-data-wagon" (not "talos-datawagon" —
  # that's only a local kubectl context alias).
  - name: us-data-wagon
    clusterName: us-data-wagon
    helm:
      valuesFiles:
        - ./chart/talos-datawagon.yaml
  - name: us-vultr-high-performance
    clusterName: us-vultr-high-performance
    helm:
      valuesFiles:
        - ./chart/us-spot-cluster.yaml
        - ./chart/us-vultr.yaml

  - name: us-linode
    clusterName: us-linode
    helm:
      valuesFiles:
        - ./chart/us-spot-cluster.yaml
        - ./chart/us-linode.yaml

  - name: talos-eu-hcloud
    clusterName: talos-eu-hcloud
    helm:
      valuesFiles:
        - ./chart/talos.yaml

  - name: talos-linode
    clusterName: talos-linode
    helm:
      valuesFiles:
        - ./chart/talos-linode.yaml
