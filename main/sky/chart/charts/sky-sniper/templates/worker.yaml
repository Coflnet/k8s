{{ if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Chart.Name }}-worker"
  labels:
    app: "{{ .Chart.Name }}-worker"
spec:
  replicas: {{ .Values.worker.replicaCount }}
  strategy: 
    type: {{ .Values.worker.strategy }}
  progressDeadlineSeconds: 2592000
  selector:
    matchLabels:
      app: "{{ .Chart.Name }}-worker"
  template:
    metadata:
      labels:
        app: "{{ .Chart.Name }}-worker"
        security.coflnet.com/k8s-api-access: "false"
      annotations:
        {{ toYaml .Values.global.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ .Chart.Name }}
      imagePullSecrets:
      {{ toYaml .Values.global.imagePullSecrets | nindent 8 }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
      {{ toYaml .Values.nodeSelector | nindent 8 }}
      containers:
      - name: "{{ .Chart.Name }}"
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag  }}"
        ports:
           {{ toYaml .Values.ports | nindent 10 }}
        env:
          - name: OPENBAO__ENABLED
            value: "true"
          - name: OPENBAO__OPTIONAL
            value: "true"
          - name: OPENBAO__ADDR
            value: {{ .Values.global.openbaoAddr | default "http://openbao.openbao.svc:8200" }}
          - name: OPENBAO__MOUNT
            value: kv
          - name: OPENBAO__PATH
            value: {{ printf "sky/%s" .Chart.Name | quote }}
          - name: OPENBAO__ROLE
            value: {{ .Chart.Name | quote }}
          {{ if .Values.global.openbaoCACert }}
          - name: OPENBAO__CACERT
            value: /openbao/tls/ca.crt
          {{ end }}
          - name: REDIS_HOST
            value: "{{ .Chart.Name }}-redis,syncTimeout=1000"
          - name: IS_MANAGER
            value: "false"
          {{ if .Values.envVars }}
          {{ include "coflnet.envVars" (dict "root" . "env" .Values.envVars) | nindent 10 }}
          {{ end }}
          {{ include "coflnet.envVars" (dict "root" . "env" .Values.global.envVars) | nindent 10 }}
          {{ include "coflnet.envVars" (dict "root" . "env" .Values.global.minioEnvVars) | nindent 10 }}
        readinessProbe:
          {{ toYaml .Values.readinessProbe | nindent 10 }}
        resources:
          {{ toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        {{ range .Values.global.volumes }}
        - name: {{ .mountName }}
          mountPath: {{ .mountPath }}
        {{ end }}
      volumes: 
      {{ range .Values.global.volumes }}
        - name: {{ .mountName }}
          {{ if eq .type "configmap"  }}
          configMap:
            name: {{ .name }}
          {{ else}}
          secret:
            secretName: {{ .name }}
          {{ end }}
      {{ end }}
{{ end }}
