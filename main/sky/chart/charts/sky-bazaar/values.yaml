enabled: true
replicaCount: 1

migration:
  enabled: false

strategy: RollingUpdate
rollingUpdate:
  maxSurge: 1
  maxUnavailable: 1
image:
  repository: muehlhansfl/skybazaar
  tag: 685c40a6dcd35cef31f861d7160842ffc3191b68
  pullPolicy: IfNotPresent

ports:
  - name: api
    containerPort: 8000

resources:
  requests:
    cpu: 800m
    memory: 800Mi

serivcePorts:
  - name: api
    port: 8000
    targetPort: 8000

readinessProbe:
  httpGet:
    path: /ready
    port: api
  initialDelaySeconds: 20
  periodSeconds: 3
startupProbe:
  httpGet:
    path: /ready
    port: api
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 90
livenessProbe:
  httpGet:
    path: /ready
    port: api
  initialDelaySeconds: 180
  periodSeconds: 30
  timeoutSeconds: 2
  failureThreshold: 5
  successThreshold: 1

envVars:
  # new scylla configuration
  - name: CASSANDRA__HOSTS
    valueFrom:
      configMapKeyRef:
        name: scylla-config
        key: scylla_host
  - name: CASSANDRA__USER
    valueFrom:
      configMapKeyRef:
        name: scylla-config
        key: scylla_bazaar_user
  - name: CASSANDRA__PASSWORD
    valueFrom:
      secretKeyRef:
        name: scylla-credentials
        key: bazaar_password
  - name: CASSANDRA__X509Certificate_PATHS
    value: /tls/scylla/secret/db.pfx
  - name: CASSANDRA__X509Certificate_PASSWORD
    valueFrom:
      secretKeyRef:
        name: scylla-credentials
        key: db-pfx-password
  - name: CASSANDRA__KEYSPACE
    value: "bazaar_quickstatus"

migrationEnvVars:

  # overwrite the kafka consumer group
  - name: KAFKA__CONSUMER_GROUP
    value: "sky-bazaar-new"

  # new scylla configuration
  - name: CASSANDRA__HOSTS
    valueFrom:
      configMapKeyRef:
        name: scylla-config
        key: scylla_host
  - name: CASSANDRA__USER
    valueFrom:
      configMapKeyRef:
        name: scylla-config
        key: scylla_bazaar_user
  - name: CASSANDRA__PASSWORD
    valueFrom:
      secretKeyRef:
        name: scylla-credentials
        key: bazaar_password
  - name: CASSANDRA__X509Certificate_PATHS
    value: /tls/scylla/secret/db.pfx
  - name: CASSANDRA__X509Certificate_PASSWORD
    valueFrom:
      secretKeyRef:
        name: scylla-credentials
        key: db-pfx-password
  - name: CASSANDRA__KEYSPACE
    value: "bazaar_quickstatus"

  # old cassandra configuration
  - name: OLD_CASSANDRA__HOSTS
    valueFrom:
      configMapKeyRef:
        name: config
        key: cassandra_host
  - name: OLD_CASSANDRA__USER
    valueFrom:
      configMapKeyRef:
        name: config
        key: cassandra_user
  - name: OLD_CASSANDRA__PASSWORD
    valueFrom:
      secretKeyRef:
        name: secret
        key: cassandra_password
  - name: OLD_CASSANDRA__KEYSPACE
    value: "bazaar_quickstatus"

  # S3 cold-tier archive for 5-min history >30 days.
  # Non-secret values are inlined here so they are versioned in git;
  # only the credentials live in the skybazaar-s3 secret.
  - name: S3__ENABLED
    value: "false"
  - name: S3__ENDPOINT
    value: ""
  - name: S3__REGION
    value: "auto"
  - name: S3__BUCKET
    value: "skybazaar-cold"
  - name: S3__USE_PATH_STYLE
    value: "true"
  - name: S3__ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: skybazaar-s3
        key: S3__ACCESS_KEY
  - name: S3__SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: skybazaar-s3
        key: S3__SECRET_KEY
  # Archive background sweep - leave disabled until S3 reads are
  # confirmed working in production. Flip to "true" to start writing
  # cold blocks; flip DROP_LEGACY_TABLE to "true" only after the
  # QuickStatusMin contents have been observed in S3.
  - name: HISTORY_ARCHIVE__ENABLED
    value: "false"
  - name: HISTORY_ARCHIVE__RETENTION_HOT_DAYS
    value: "30"
  - name: HISTORY_ARCHIVE__DROP_LEGACY_TABLE
    value: "false"
  

