{{ if and .Values.enabled (or (not (hasKey .Values "rollout")) .Values.rollout.enabled) }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
  annotations:
    fleet.cattle.io/ignore-drift: "true"
spec:
  replicas: {{ .Values.replicaCount }}
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
        security.coflnet.com/k8s-api-access: "false"
      annotations:
        {{ toYaml .Values.global.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ .Chart.Name }}
      imagePullSecrets:
      {{ toYaml .Values.global.imagePullSecrets | nindent 8 }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        image: {{ .Values.image.repository }}:{{ .Values.image.tag  }}
        ports:
           {{ toYaml .Values.ports | nindent 10 }}
        env:
          - name: OPENBAO__ENABLED
            value: "true"
          - name: OPENBAO__OPTIONAL
            value: "true"
          - name: OPENBAO__ADDR
            value: {{ .Values.global.openbaoAddr | default "http://openbao.openbao.svc:8200" }}
          - name: OPENBAO__MOUNT
            value: kv
          - name: OPENBAO__PATH
            value: {{ printf "sky/%s" .Chart.Name | quote }}
          - name: OPENBAO__ROLE
            value: {{ .Chart.Name | quote }}
          {{- if $.Values.global.openbaoCACert }}
          - name: OPENBAO__CACERT
            value: /openbao/tls/ca.crt
          {{- end }}
          - name: REDIS_HOST
            value: "{{ .Chart.Name }}-redis,syncTimeout=1000"
          - name: IMGPROXY_BASE_URL
            value: "http://{{ .Chart.Name }}-imgproxy:80"
          {{ if .Values.envVars }}
          {{ include "coflnet.envVars" (dict "root" . "env" .Values.envVars) | nindent 10 }}
          {{ end }}
          {{ include "coflnet.envVars" (dict "root" . "env" .Values.global.envVars) | nindent 10 }}
          {{ include "coflnet.envVars" (dict "root" . "env" .Values.global.frontendEnvVars) | nindent 10 }}
        readinessProbe:
          {{ toYaml .Values.readinessProbe | nindent 10 }}
        resources:
          {{ toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        {{ range .Values.global.volumes }}
        - name: {{ .mountName }}
          mountPath: {{ .mountPath }}
        {{ end }}
      volumes: 
      {{ range .Values.global.volumes }}
        - name: {{ .mountName }}
          {{ if eq .type "configmap"  }}
          configMap:
            name: {{ .name }}
          {{ else}}
          secret:
            secretName: {{ .name }}
          {{ end }}
      {{ end }}
  strategy:
    canary:
{{- if .Values.canary.trafficRouting }}
{{ toYaml .Values.canary | nindent 6 }}
{{- else }}
{{- $canary := omit .Values.canary "trafficRouting" }}
{{ toYaml $canary | nindent 6 }}
{{- end }}
{{ end }}
