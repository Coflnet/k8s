{{ if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-imgproxy
  labels:
    app: {{ .Chart.Name }}-imgproxy
spec:
  replicas: {{ .Values.imgproxy.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}-imgproxy
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-imgproxy
        security.coflnet.com/k8s-api-access: "false"
    spec:
      serviceAccountName: {{ .Chart.Name }}
      containers:
      - name: {{ .Chart.Name }}-imgproxy
        image: darthsim/imgproxy:v3.12
        ports:
          - containerPort: 8080
            name: http
          - containerPort: 9000
            name: metrics
        env:
          - name: OPENBAO__ENABLED
            value: "true"
          - name: OPENBAO__OPTIONAL
            value: "false"
          - name: OPENBAO__ADDR
            value: http://openbao.openbao.svc:8200
          - name: OPENBAO__MOUNT
            value: kv
          - name: OPENBAO__PATH
            value: {{ printf "sky/%s" .Chart.Name | quote }}
          - name: OPENBAO__ROLE
            value: {{ .Chart.Name | quote }}
          - name: IMGPROXY_ALLOWED_SOURCES
            value: "https://sky.shiiyu.moe/,https://skycrypt.coflnet.com,https://mc-heads.net/,https://crafatar.com/,https://static.coflnet.com/,https://sky.coflnet.com"
          - name: IMGPROXY_MAX_ANIMATION_FRAMES
            value: "140"
          - name: IMGPROXY_PROMETHEUS_BIND
            value: ":9000"
        resources:
          requests:
            memory: "140Mi"
            cpu: "10m"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-imgproxy
  labels:
    app: {{ .Chart.Name }}-imgproxy
spec:
  selector:
    app: {{ .Chart.Name }}-imgproxy
  ports:
    - port: 80
      targetPort: 8080
      name: http
    - port: 9000
      targetPort: 9000
      name: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Chart.Name }}-imgproxy-servicemonitor
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: imgproxy
  endpoints:
    - port: metrics
      interval: 60s
      path: /
{{ end }}
