{{ if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-preview
spec:
  # .spec.selector is owned by Argo Rollouts (blueGreen previewService); omitted so
  # Fleet's server-side apply does not conflict with the rollouts-controller.
  ports:
    - port: 80
      targetPort: 3000
{{ end }}
