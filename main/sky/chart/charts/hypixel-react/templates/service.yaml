{{ if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
spec:
  # .spec.selector is owned by Argo Rollouts (blueGreen activeService); it injects
  # rollouts-pod-template-hash. Omitted here so Fleet's server-side apply does not
  # conflict with the rollouts-controller. Do NOT re-add it.
  ports:
  - port: 80
    targetPort: 3000
{{ end }}
