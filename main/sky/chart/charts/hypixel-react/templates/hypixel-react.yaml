{{ if .Values.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      imagePullSecrets:
      {{ toYaml .Values.global.imagePullSecrets | nindent 8 }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: chown-next
          image: busybox:1.36
          command: ["chown", "-R", "65532:65532", "/opt/app/.next"]
          securityContext:
            runAsUser: 0
            capabilities:
              add: ["CHOWN", "DAC_OVERRIDE"]
              drop: ["ALL"]
          volumeMounts:
            - name: next-cache
              mountPath: /opt/app/.next/cache
      volumes:
        - name: next-cache
          emptyDir: {}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: next-cache
              mountPath: /opt/app/.next/cache
          image: {{ .Values.image.repository }}:{{ .Values.image.tag  }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
          {{ include "coflnet.envVars" (dict "root" . "env" .Values.envVars) | nindent 12 }}
          ports:
          {{ toYaml .Values.ports | nindent 12 }}
          readinessProbe:
          {{ toYaml .Values.readinessProbe | nindent 12 }}
          resources:
          {{ toYaml .Values.resources | nindent 12 }}
  strategy:
    blueGreen:
      activeService: {{ .Chart.Name }}
      previewService: {{ .Chart.Name }}-preview
      autoPromotionEnabled: true
      autoPromotionSeconds: 300
      scaleDownDelaySeconds: 120
      previewReplicaCount: 1
{{ end }}
