enabled: true
# Steady state is a single instance: sky-items collides on DB writes and runs
# slower with 2 concurrent instances. The rollout's maxSurge: 1 / maxUnavailable: 0
# (see templates/rollout.yaml) briefly surges to 2 during a version rollout so the
# new pod is healthy before the old one is terminated - never a zero-instance gap.
replicaCount: 1

rollout:
  enabled: true

# PodDisruptionBudget: refuses voluntary disruption (node drain, host upgrade)
# that would take the sole pod below minAvailable: 1. Note this only blocks
# eviction - it does NOT surge a replacement first - so a node drain targeting
# this pod will stall/fail rather than silently dropping to zero instances.
# To drain that node without downtime, scale to 2 first, let the new pod go
# Ready, drain, then scale back to 1.
pdb:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: true

image:
  repository: muehlhansfl/skyitems
  tag: 706e7cca02b316d6a34708222969dc09ab5d01cf
  pullPolicy: IfNotPresent

ports:
  - name: api
    containerPort: 8000

resources:
  requests:
    cpu: 200m
    memory: 512Mi

serivcePorts:
  - name: api
    port: 8000
    targetPort: 8000

readinessProbe:
  httpGet:
    path: /api/index.html
    port: api
  initialDelaySeconds: 20
  periodSeconds: 3
livenessProbe:
  httpGet:
    path: /api/index.html
    port: api
  initialDelaySeconds: 20
  periodSeconds: 3
  failureThreshold: 5

envVars:
  - name: DBCONNECTION
    valueFrom:
      secretKeyRef:
        name: secret
        key: connection_read_secondary
  - name: DB_CONNECTION
    valueFrom:
      secretKeyRef:
        name: secret
        key: connection_items_database
