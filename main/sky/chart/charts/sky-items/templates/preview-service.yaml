{{ if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-preview
  labels:
    app: {{ .Chart.Name }}
spec:
  # .spec.selector is owned by Argo Rollouts (canary canaryService); omitted so
  # Fleet's server-side apply does not conflict with the rollouts-controller.
  ports:
    {{ toYaml .Values.serivcePorts | nindent 4 }}
---
{{ end }}
