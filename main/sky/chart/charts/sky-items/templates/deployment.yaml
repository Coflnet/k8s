{{ if and .Values.enabled (hasKey .Values "rollout") (not .Values.rollout.enabled) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  progressDeadlineSeconds: 2592000
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
        security.coflnet.com/k8s-api-access: "false"
      annotations:
        {{ toYaml .Values.global.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ .Chart.Name }}
      {{- if $.Values.global.openbaoAuthPath }}
      automountServiceAccountToken: false
      {{- end }}
      imagePullSecrets:
      {{ toYaml .Values.global.imagePullSecrets | nindent 8 }}
      securityContext:
        runAsNonRoot: true
        {{- if $.Values.global.openbaoAuthPath }}
        fsGroup: 1000
        {{- end }}
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        ports:
           {{ toYaml .Values.ports | nindent 10 }}
        env:
          - name: OPENBAO__ENABLED
            value: "true"
          - name: OPENBAO__OPTIONAL
            value: {{ ternary "false" "true" (not (empty $.Values.global.openbaoAuthPath)) | quote }}
          - name: OPENBAO__ADDR
            value: {{ .Values.global.openbaoAddr | default "http://openbao.openbao.svc:8200" }}
          - name: OPENBAO__MOUNT
            value: kv
          - name: OPENBAO__PATH
            value: {{ printf "sky/%s" .Chart.Name | quote }}
          - name: OPENBAO__ROLE
            value: {{ .Chart.Name | quote }}
          {{- if $.Values.global.openbaoAuthPath }}
          - name: OPENBAO__AUTH_PATH
            value: {{ $.Values.global.openbaoAuthPath | quote }}
          - name: OPENBAO__TOKEN_PATH
            value: /var/run/secrets/openbao/token
          {{- if $.Values.global.openbaoTLSServerName }}
          - name: OPENBAO__TLS_SERVER_NAME
            value: {{ $.Values.global.openbaoTLSServerName | quote }}
          {{- end }}
          - name: OPENBAO__REQUEST_TIMEOUT_SECONDS
            value: "5"
          - name: OPENBAO__STARTUP_RETRY_SECONDS
            value: "90"
          - name: OPENBAO__RETRY_DELAY_SECONDS
            value: "2"
          {{- end }}
          {{- if $.Values.global.openbaoCACert }}
          - name: OPENBAO__CACERT
            value: /openbao/tls/ca.crt
          {{- end }}
          {{ if .Values.envVars }}
          {{ include "coflnet.envVars" (dict "root" . "env" .Values.envVars "excludeNames" (ternary (list "DBCONNECTION" "DB_CONNECTION") (list) (not (empty $.Values.global.openbaoAuthPath)))) | nindent 10 }}
          {{ end }}
          {{ include "coflnet.envVars" (dict "root" . "env" .Values.global.envVars "excludeNames" (ternary (list "KAFKA__BROKERS" "KAFKA__USERNAME" "KAFKA__PASSWORD") (list) (not (empty $.Values.global.openbaoAuthPath)))) | nindent 10 }}
          {{ include "coflnet.envVars" (dict "root" . "env" .Values.global.frontendEnvVars) | nindent 10 }}
        readinessProbe:
          {{ toYaml .Values.readinessProbe | nindent 10 }}
        {{- if .Values.livenessProbe }}
        livenessProbe:
          {{ toYaml .Values.livenessProbe | nindent 10 }}
        {{- end }}
        resources:
          {{ toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        {{- if $.Values.global.openbaoAuthPath }}
        - name: openbao-workload-token
          mountPath: /var/run/secrets/openbao
          readOnly: true
        {{- end }}
        {{ range .Values.global.volumes }}
        - name: {{ .mountName }}
          mountPath: {{ .mountPath }}
        {{ end }}
      volumes:
      {{- if $.Values.global.openbaoAuthPath }}
        - name: openbao-workload-token
          projected:
            defaultMode: 0440
            sources:
              - serviceAccountToken:
                  audience: openbao
                  expirationSeconds: 600
                  path: token
      {{- end }}
      {{ range .Values.global.volumes }}
        - name: {{ .mountName }}
          {{ if eq .type "configmap" }}
          configMap:
            name: {{ .name }}
          {{ else }}
          secret:
            secretName: {{ .name }}
          {{ end }}
      {{ end }}
{{ end }}
