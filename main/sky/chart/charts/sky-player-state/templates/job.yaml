{{ if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Chart.Name }}-migration"
  labels:
    app: "{{ .Chart.Name }}-migration"
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: "{{ .Chart.Name }}-migration"
  template:
    metadata:
      labels:
        app: "{{ .Chart.Name }}-migration"
        security.coflnet.com/k8s-api-access: "false"
    spec:
      serviceAccountName: {{ .Chart.Name }}
      imagePullSecrets:
      {{ toYaml .Values.global.imagePullSecrets | nindent 12 }}
      containers:
       - name: {{ .Chart.Name }}
         image: {{ .Values.image.repository }}:{{ .Values.image.tag  }}
         ports:
          {{ toYaml .Values.ports | nindent 10 }}
         env:
          - name: OPENBAO__ENABLED
            value: "true"
          - name: OPENBAO__OPTIONAL
            value: "false"
          - name: OPENBAO__ADDR
            value: http://openbao.openbao.svc:8200
          - name: OPENBAO__MOUNT
            value: kv
          - name: OPENBAO__PATH
            value: {{ printf "sky/%s" .Chart.Name | quote }}
          - name: OPENBAO__ROLE
            value: {{ .Chart.Name | quote }}
          - name: REDIS_HOST
            value: "{{ .Chart.Name }}-redis"
         {{ if .Values.envVars }}
         {{ include "coflnet.envVars" (dict "root" . "env" .Values.envVars) | nindent 10 }}
         {{ end }}
         {{ include "coflnet.envVars" (dict "root" . "env" .Values.global.envVars) | nindent 10 }}
          - name: MIGRATOR
            value: "true"
         readinessProbe:
         {{ toYaml .Values.readinessProbe | nindent 10 }}
         resources:
         {{ toYaml .Values.resources | nindent 10 }}
         volumeMounts:
       {{ range .Values.global.volumes }}
           - name: {{ .mountName }}
             mountPath: {{ .mountPath }}
       {{ end }}
           - name: scylla-pfx
             mountPath: /tls/scylla/secret/db.pfx
             subPath: db.pfx
      volumes:
       - name: scylla-pfx
         secret:
           secretName: scylla-pfx
           items:
             - key: db.pfx
               path: db.pfx
      {{ range $.Values.global.volumes }}
       - name: {{ .mountName }}
         {{ if eq .type "configmap"  }}
         configMap:
           name: {{ .name }}
         {{ else}}
         secret:
           secretName: {{ .name }}
         {{ end }}
      {{ end }}
{{ end }}