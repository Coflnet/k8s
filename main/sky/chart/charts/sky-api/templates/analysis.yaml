{{ if .Values.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ .Chart.Name }}
spec:
  args:
  - name: service-name
  - name: pod-hash
  metrics:
  - name: sky-api-error
    interval: 1m
    successCondition: result[0] < 1
    failureLimit: 1
    count: 3
    provider:
      prometheus:
        address: http://prometheus-kube-prometheus-prometheus.prometheus.svc.cluster.local:9090
        query: |
          sum(rate(sky_api_error{pod=~"sky-api-{{ "{{args.pod-hash}}" }}-.*"}[5m]))
{{ end }}
