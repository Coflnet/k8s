sky-bfcs:
  enabled: true
  # First rollout keeps current values as fallbacks. Set false only after the
  # OpenBao load receipt and runtime logs have been verified.
  openbaoOptional: true
  serviceMonitor:
    enabled: false
  metrics:
    enabled: false
  replicaCount: 1
  # not enough RAM to run 2 so replace in place instead of surging.
  strategy: Recreate
  defaultEnvVarsEnabled: false
  externalMinio: true
  ingress:
    enabled: true
    tls:
      enabled: true
    nginx: false
    host: us-linode.coflnet.com
  envVars:
    - name: JAEGER_AGENT_HOST
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
    - name: OTEL_EXPORTER_JAEGER_AGENT_HOST
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
    - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
      value: http://jaeger-collector-eu-cluster.observability:4317
    - name: SNIPER_BASE_URL
      value: http://sky-sniper-eu-cluster:8000
    # Local Redis via password auth (TLS deferred — see internal/infrastructure/pki.md).
    - name: FLIP_REDIS_OPTIONS
      value: sky-bfcs-redis,password=aFeFLKKrhruu5BsozBDxc/LfBv0oHuG0,syncTimeout=1000
    - name: REDIS_HOST
      value: sky-bfcs-redis,password=aFeFLKKrhruu5BsozBDxc/LfBv0oHuG0,syncTimeout=1000
    # Redis flip instances.
    - name: REDIS_FLIP_INSTANCES__0
      value: sky-bfcs-redis,password=aFeFLKKrhruu5BsozBDxc/LfBv0oHuG0,syncTimeout=1000
    # Cloudfanatic (US) Redis for cross-cluster flip pub/sub.
    # Password from redis-password secret on cloudfanatic, synced to redis-cloudfanatic secret here.
    - name: REDIS_FLIP_INSTANCES__1
      valueFrom:
        secretKeyRef:
          name: redis-cloudfanatic
          key: connection
    # Talos Datawagon Redis for cross-cluster flip pub/sub.
    # Password from redis-password secret on talos-datawagon, synced to redis-talos-datawagon secret here.
    - name: REDIS_FLIP_INSTANCES__2
      valueFrom:
        secretKeyRef:
          name: redis-talos-datawagon
          key: connection
  # Redis: password auth, NodePort 31379 for cross-cluster access from talos-eu / talos-cloudfanatic.
  # TODO: upgrade to TLS+mTLS (see scripts/redis-mtls-*.sh and internal/infrastructure/pki.md)
  redis:
    enabled: true
    serviceType: NodePort
    nodePort: 31379
    password: aFeFLKKrhruu5BsozBDxc/LfBv0oHuG0

