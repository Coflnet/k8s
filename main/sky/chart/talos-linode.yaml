# Talos Linode overlay (single-node, replaces us-linode).
# sky-bfcs is the first production canary for the dedicated OpenBao cluster;
# existing Kubernetes/env fallbacks remain until its OpenBao load receipt is
# verified, then they can be removed in a separate reviewed change.
# Cilium CNI — no Linkerd sidecar.

global:
  # Cilium CNI, not Linkerd.
  podAnnotations: {}

  # Public images on Docker Hub.
  imagePullSecrets: []

  # Dedicated secrets-cluster access through the Fleet-owned HA Tailscale
  # egress Service. JWT validation is offline against talos-linode's public OIDC
  # issuer, so OpenBao never needs access to this cluster's API server.
  openbaoAddr: https://openbao-secrets.openbao.svc:8200
  openbaoAuthPath: jwt-talos-linode
  openbaoTLSServerName: openbao.openbao.svc.cluster.local
  openbaoCACert: |
    -----BEGIN CERTIFICATE-----
    MIIBbTCCARSgAwIBAgIUFjyDQv3FGn29svU0l0fMAYJW77kwCgYIKoZIzj0EAwIw
    FTETMBEGA1UEAxMKb3BlbmJhby1jYTAeFw0yNjA1MzAwNjMwMDdaFw0zNjA1Mjcw
    NjMwMDdaMBUxEzARBgNVBAMTCm9wZW5iYW8tY2EwWTATBgcqhkjOPQIBBggqhkjO
    PQMBBwNCAATP+OVpqk8lnHealoOSbRZpInlL4ypSkvSCR0ksELx2Xg/eJJY3y9gj
    tRrEp6OXd24Wwoy2L4V74FkfO+dkfUTko0IwQDAOBgNVHQ8BAf8EBAMCAqQwDwYD
    VR0TAQH/BAUwAwEB/zAdBgNVHQ4EFgQUTs+GuzkdJhBXyXXlwZI7Mn3pr8gwCgYI
    KoZIzj0EAwIDRwAwRAIgA1l0MK0v3oIhoVgys1U/jdVZig/jp/SMhGJTilO25FkC
    IDcNtGjLm4jxvXj9MrrNBwICv2XvSscsE/nc8Je3zE8D
    -----END CERTIFICATE-----

  volumes:
    - mountName: openbao-ca
      mountPath: /openbao/tls
      name: openbao-ca
      type: configmap

  redis:
    enabled: false

  secret:
    enabled: false

  config:
    enabled: false

  # S3/R2 credentials for state loading (read-only).
  minioEnvVars:
    - name: MINIO_HOST
      valueFrom:
        configMapKeyRef:
          key: host
          name: minio
    - name: MINIO_SECRET
      valueFrom:
        secretKeyRef:
          key: secret_key
          name: minio
    - name: MINIO_KEY
      valueFrom:
        secretKeyRef:
          key: access_key
          name: minio

  envVars:
    - name: RATE_LIMITER_REDIS_HOST
      value: sky-commands-redis
    - name: SETTINGS_REDIS_HOST
      value: sky-settings-redis-eu-cluster
    - name: JAEGER_AGENT_HOST
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
    - name: OTEL_EXPORTER_JAEGER_AGENT_HOST
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
    - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
      value: http://jaeger-collector-eu-cluster.observability:4317

    # Base URLs — cross-cluster communication back to eu-cluster services.
    - name: API_BASE_URL
      value: http://sky-api:8000
    - name: BAZAAR_BASE_URL
      value: http://sky-bazaar-eu-cluster:8000
    - name: BAZAARFLIPPER_BASE_URL
      value: http://sky-bazaar-flipper-eu-cluster:8000
    - name: ITEMS_BASE_URL
      value: http://sky-items-eu-cluster:8000
    - name: MAYOR_BASE_URL
      value: http://sky-mayor-eu-cluster:8080
    - name: PLAYERNAME_BASE_URL
      value: http://sky-player-name-eu-cluster:8000
    - name: PLAYERNAME_URL
      value: http://sky-player-name-eu-cluster:8000
    - name: REFERRAL_BASE_URL
      value: http://sky-referral-eu-cluster:8000
    - name: SETTINGS_BASE_URL
      value: http://sky-settings-eu-cluster:8000
    - name: SNIPER_BASE_URL
      value: http://sky-sniper-eu-cluster:8000
    - name: INDEXER_BASE_URL
      value: http://sky-indexer-eu-cluster:8000
    - name: SUBSCRIPTION_BASE_URL
      value: http://sky-subscriptions-eu-cluster:8000
    - name: SKYFLIPPER_BASE_URL
      value: http://sky-flipper-eu-cluster:8000
    - name: SKYCOMMANDS_BASE_URL
      value: http://sky-commands-eu-cluster:8008
    - name: PAYMENTS_BASE_URL
      value: http://sky-payments-eu-cluster.payment:8000
    - name: PROFILE_BASE_URL
      value: http://sky-profiles-eu-cluster:8000
    - name: PLAYERSTATE_BASE_URL
      value: http://sky-player-state-eu-cluster:8000
    - name: CRAFTS_BASE_URL
      value: http://sky-crafts-eu-cluster:8000
    - name: UPDATER_BASE_URL
      value: http://sky-updater-eu-cluster:8000
