{{ if (.Values.global.redis | default dict).enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.global.redis.name }}
  labels:
    app: {{ .Values.global.redis.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.global.redis.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.global.redis.name }}
    spec:
      {{ toYaml .Values.global.hetznerAffinity | nindent 6 }}
      containers:
      - name: {{ .Values.global.redis.name }}
        image: redis:7.0.5
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          runAsNonRoot: true
          runAsUser: 999
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 6379
        resources:
          {{ toYaml .Values.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.global.redis.name }}
  labels:
    "mirror.linkerd.io/exported": "true"
spec:
  selector:
    app: {{ .Values.global.redis.name }}
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
{{ end }}
