{{ if .Values.global.ingress }}
{{ if .Values.global.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sky-ingress
  namespace: sky
  annotations:
      kubernetes.io/ingress.class: "nginx"
      # service-upstream forces nginx to route through the Service ClusterIP, whose
      # Cilium eBPF backend map intermittently desyncs to zero backends on Argo
      # Rollouts selector flips (blueGreen activeService / canary), causing
      # hostNetwork nginx -> EHOSTUNREACH -> 502 (e.g. sky.coflnet.com via
      # hypixel-react). Removing it makes nginx load-balance straight to pod
      # endpoints from its own (reliable) EndpointSlice watch, bypassing the bug.
      # Defaults ON to preserve behavior; set global.ingress.serviceUpstream: false
      # per-cluster to disable. Only safe where Argo nginx trafficRouting is unused.
      {{- if ne (toString .Values.global.ingress.serviceUpstream) "false" }}
      nginx.ingress.kubernetes.io/service-upstream: "true"
      {{- end }}
      # Peak EWMA: route each request to the lowest-latency pod instead of plain
      # round-robin, so a slow/degraded node automatically receives less traffic.
      # Only has effect when nginx balances pod endpoints directly (service-upstream
      # off); a no-op when routing to a single ClusterIP upstream.
      nginx.ingress.kubernetes.io/load-balance: "ewma"
      nginx.ingress.kubernetes.io/client-body-buffer-size: 1M
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  defaultBackend:
    service: 
      name: hypixel-react
      port:
        number: 80
  tls:
    - hosts:
        - sky-mod.coflnet.com
      secretName: sky-mod-tls
  rules:

  - host: sky.coflnet.com
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: hypixel-react
            port:
              number: 80
      - path: /api/tem
        pathType: ImplementationSpecific
        backend:
          service:
            name: tem-backend
            port:
              number: 8080
      # sniper state transfer
      - path: /api/Sniper/lookup
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-sniper
            port:
              number: 8000
      - path: /api/profile
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-profiles
            port:
              number: 8000
      - path: /api/chat/send
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-chat
            port:
              number: 8000
      - path: /api/chat/mute
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-chat
            port:
              number: 8000
      - path: /api
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-api
            port:
              number: 8000
      - path: /avatars
        pathType: ImplementationSpecific
        backend:
          service:
            name: crafatar
            port:
              number: 3000
      - path: /command
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-commands
            port:
              number: 8008
      - path: /skyblock
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-commands
            port:
              number: 8008
      - path: /static
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-commands
            port:
              number: 8008
      - path: /swagger
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-commands
            port:
              number: 80
      - path: /modsocket
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-mod-commands
            port:
              number: 8008
      - path: /instances
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-mod-commands
            port:
              number: 8008

  - host: sky-commands.coflnet.com
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: hypixel-react-preview
            port:
              number: 80
      - path: /api
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-api
            port:
              number: 8000
      - path: /command
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-commands
            port:
              number: 8008
      - path: /skyblock
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-commands
            port:
              number: 8008
      - path: /static
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-commands
            port:
              number: 8008
      - path: /swagger
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-commands
            port:
              number: 8008
      - path: /modsocket
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-mod-commands
            port:
              number: 8008

  - host: sky-preview.coflnet.com
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-commands
            port:
              number: 8008
      - path: /api
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-commands
            port:
              number: 80
  - host: skyblock.coflnet.com
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-commands
            port:
              number: 8008
  - host: skyblock-backend.coflnet.com
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-commands
            port:
              number: 8008
  - host: sky-mod.flou.dev
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-mod-commands
            port:
              number: 8008
  - host: sky-mod.coflnet.com
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: sky-mod-commands
            port:
              number: 8008
{{ end }}
{{ end }}
