      value: release
    - name: MONGO_URL
      valueFrom:
        secretKeyRef:
          name: sky-mayor-db
          key: mongo_url
    - name: CASSANDRA__HOSTS
      valueFrom:
        configMapKeyRef:
          name: scylla-config
          key: scylla_host
    - name: CASSANDRA__KEYSPACE
      value: "sky_mayor"
    - name: CASSANDRA__USER
      valueFrom:
        configMapKeyRef:
          name: scylla-config
          key: scylla_mayor_user
    - name: CASSANDRA__PASSWORD
      valueFrom:
        secretKeyRef:
          name: scylla-credentials
          key: mayor_password
    - name: CASSANDRA__X509Certificate_PATHS
      value: /tls/scylla/secret/db.pfx
    - name: CASSANDRA__X509Certificate_PASSWORD
      valueFrom:
        secretKeyRef:
          name: scylla-credentials
          key: db-pfx-password
  livenessProbe:
    initialDelaySeconds: 90
  readinessProbe:
    initialDelaySeconds: 90

sky-mc-connect:
  enabled: true
  serviceMonitor:
    enabled: false
  envVars:
