sky-referral:
  enabled: true
  serviceMonitor:
    enabled: false
  envVars:
    - name: DB_CONNECTION
      valueFrom:
        secretKeyRef:
          name: sky-referral-db
          key: connection
    - name: PRODUCTS__REFERAL_BONUS
      value: "referal_bonus"
    - name: PRODUCTS__VERIFY_MC
      value: "verify_mc"
    - name: TOPICS__TRANSACTION
      value: "sky-transactions"
  livenessProbe:
    initialDelaySeconds: 90
  readinessProbe:
    initialDelaySeconds: 90

sky-settings:
  enabled: true
  # NOTE: Uses scylla-pfx, scylla-credentials, scylla-config for ScyllaDB mTLS.
  # These k8s secrets/ConfigMaps were copied from eu-cluster to talos.
  # DB connection and Kafka creds come from OpenBao kv/sky/sky-settings.
  envVars:
    - name: CASSANDRA__HOSTS
      valueFrom:
        configMapKeyRef:
          name: scylla-config
          key: scylla_host
    - name: CASSANDRA__KEYSPACE
      value: "settings"
    - name: CASSANDRA__USER
      valueFrom:
        configMapKeyRef:
          name: scylla-config
          key: scylla_settings_user
    - name: CASSANDRA__PASSWORD
      valueFrom:
        secretKeyRef:
          name: scylla-credentials
          key: settings_password
    - name: CASSANDRA__X509Certificate_PATHS
      value: /tls/scylla/secret/db.pfx
    - name: CASSANDRA__X509Certificate_PASSWORD
      valueFrom:
        secretKeyRef:
          name: scylla-credentials
          key: db-pfx-password
  livenessProbe:
    initialDelaySeconds: 90
  readinessProbe:
    initialDelaySeconds: 90

sky-sniper:
  enabled: true
  serviceMonitor:
    enabled: false
  nodeSelector: {}
  envVars:
    - name: DBConnection
      valueFrom:
        secretKeyRef:
          name: sky-sniper-db
          key: connection
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: sky-sniper-db
          key: jwt_secret
    - name: DOTNET_HOSTBUILDER__RELOADCONFIGONCHANGE
      value: "false"
  livenessProbe:
    initialDelaySeconds: 90
  readinessProbe:
    initialDelaySeconds: 90

sky-subscriptions:
  enabled: true
  serviceMonitor:
    enabled: false
  envVars:
    - name: DB_CONNECTION
      valueFrom:
        secretKeyRef:
          name: sky-subscriptions-db
          key: connection
    - name: DBConnection
      valueFrom:
        secretKeyRef:
          name: sky-subscriptions-db
          key: connection2
    - name: FIREBASE_SENDER_ID
      valueFrom:
        secretKeyRef:
          name: secret
          key: firebase_sender_id
    - name: FIREBASE_KEY
      valueFrom:
        secretKeyRef:
          name: secret
          key: firebase_key
  livenessProbe:
    initialDelaySeconds: 90
  readinessProbe:
    initialDelaySeconds: 90

sky-trade:
  enabled: false

sky-updater:
  enabled: true
  serviceMonitor:
    enabled: false
  envVars:
    - name: SLOWDOWN_MS
      value: "100"
    - name: apiKey
      valueFrom:
        secretKeyRef:
          name: sky-updater-db
          key: api_key
    - name: API_KEY
      valueFrom:
        secretKeyRef:
          name: sky-updater-db
          key: flou_api_key
    - name: TOPICS__MISSING_AUCTION
      value: "sky-canceledauction-raw"
    - name: TOPICS__SOLD_AUCTION
      value: "sky-soldauction-raw"
    - name: TOPICS__NEW_AUCTION
      value: "sky-newauction-raw"
    - name: TOPICS__AUCTION_ENDED
      value: "sky-endedauction-raw"
    - name: TOPICS__NEW_BID
      value: "sky-newbid-raw"
    - name: TOPICS__BAZAAR
      value: "sky-bazaar-raw"
    - name: TOPICS__AUCTION_CHECK
      value: "sky-auction-checked"
    - name: DOTNET_HOSTBUILDER__RELOADCONFIGONCHANGE
      value: "false"
  livenessProbe:
    initialDelaySeconds: 120
  readinessProbe:
    initialDelaySeconds: 90

# Web frontends — only needed on eu-cluster; keep disabled on talos.
crafatar:
  enabled: true
  envVars:
    - name: REDIS_URL
      value: "redis://sky-global-redis"
    - name: CACHE_LOCAL
      value: "36000"
    - name: CACHE_BROWSER
      value: "86000"
    - name: EPHEMERAL_STORAGE
      value: "true"
hypixel-react:
  enabled: true
  envVars:
    - name: COMMAND_ENDPOINT
      value: "http://sky-commands:8008/command"
    - name: API_ENDPOINT
      value: "http://sky-api:8000/api"
necwebsite:
  enabled: false
deprecated:
  enabled: false
