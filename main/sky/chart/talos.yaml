# Talos (talos-eu-hcloud) overlay for sky namespace.
# Applied in addition to eu.yaml defaults via Fleet targetCustomization.
#
# HOW TO ENABLE:
#   1. Create all prerequisite secrets listed below in the sky namespace on talos.
#   2. Remove `enabled: false` from sub-charts you want to bring up.
#   3. Commit, push; Fleet will deploy.
#
# ─── PREREQUISITE SECRETS (create before enabling any service) ───────────────
#
#   k8s Secret "secret":
#     connection_live        MariaDB write DSN  (e.g. Server=...;Port=3307;...)
#     connection_read_api    MariaDB read-only DSN
#     jwt_secret_api         JWT signing secret (frontend services)
#     jwt_secret_sniper      JWT signing secret (sky-bfcs / sniper)
#     paid_api_access_rules  sky-api premium rules JSON
#     gemini_api_key         Google Gemini API key (sky-api)
#     player_state_password  ScyllaDB password (sky-player-state - reads from "secret")
#
#   k8s Secret "scylla-credentials":
#     bazaar_password        ScyllaDB password for bazaar user
#     bazaar_pfx_password    PFX passphrase for bazaar mTLS cert
#     mod_password           ScyllaDB password for sky-mod-commands user
#     mod_pfx_password       PFX passphrase for mod mTLS cert
#     mayor_password         ScyllaDB password for sky-mayor user
#     mayor_pfx_password     PFX passphrase for mayor mTLS cert
#
#   k8s ConfigMap "scylla-config":
#     scylla_host            ScyllaDB contact points (comma-separated)
#     scylla_bazaar_user     ScyllaDB username for sky-bazaar
#     scylla_mod_user        ScyllaDB username for sky-mod-commands
#     scylla_mayor_user      ScyllaDB username for sky-mayor
#
#   k8s Secret "redpanda" (key: skyblock.key — Redpanda mTLS private key)
#   k8s Secret "redpanda-credentials" (keys: username, password)
#   k8s ConfigMap "redpanda" (keys: ca.crt, skyblock.crt — Redpanda mTLS certs)
#   k8s Secret "redpanda" (key: brokers — Redpanda broker addresses)
#     NOTE: eu.yaml uses secretKeyRef for "brokers"; ensure the secret has that key.
#
#   k8s Secret "harbor" (type: kubernetes.io/dockerconfigjson — image pull secret)
#   k8s ConfigMap "minio" (key: host)
#   k8s Secret "minio" (keys: access_key, secret_key)
#   k8s Secret "sniper-transfer-token" (key: sniper_transfer_token)
#
# ─── OPENBAO NOTE ────────────────────────────────────────────────────────────
#
#   Talos OpenBao uses TLS (https://openbao.openbao.svc:8200).
#   The sky service templates hardcode http:// for OPENBAO__ADDR.
#   Since OPENBAO__OPTIONAL=true, services fall back to k8s secrets gracefully.
#   Long-term fix: parameterise OPENBAO__ADDR in the service templates so it
#   can be overridden per cluster via values without replacing the whole
#   global.envVars list (Helm merges objects but replaces arrays).
#
#   Until templates are updated, OpenBao integration will be silently skipped
#   on talos for sky services. The ScyllaDB and MariaDB passwords will be
#   managed by k8s secrets initially; see the OpenBao migration section below.
#
# ─── OPENBAO ROTATION (future) ───────────────────────────────────────────────
#
#   OpenBao can rotate MariaDB and ScyllaDB passwords automatically:
#
#   MariaDB (many sky services):
#     Plugin: mysql-database-plugin
#     Static role per service (stable username, rotated password)
#     Inject password into k8s secret via External Secrets Operator, OR
#     update templates to read from OpenBao agent sidecar (as payments does).
#
#   ScyllaDB (sky-bazaar, sky-mod-commands, sky-mayor, sky-player-state):
#     Plugin: cassandra-database-plugin (ScyllaDB is Cassandra-protocol compatible)
#     Requires mTLS: configure the connection with the existing .pfx cert.
#     Same static-role pattern as MariaDB.
#
# ─────────────────────────────────────────────────────────────────────────────

global:
  # Talos uses Cilium CNI, not Linkerd. Remove the Linkerd sidecar annotation.
  podAnnotations: {}

  # Images are public on Docker Hub; no harbor pull secret needed on talos yet.
  imagePullSecrets: []

  # Ingress for sky.coflnet.com, sky-commands.coflnet.com, etc.
  # On eu-cluster the ingress lives in deprecated sub-chart (enabled).
  # On talos deprecated is disabled, so we deploy it from the parent chart.
  ingress:
    enabled: true
    # Talos runs Cilium (eBPF kube-proxy replacement) + hostNetwork nginx. The
    # Service ClusterIP eBPF backend map desyncs to zero backends on Argo Rollouts
    # selector flips, 502-ing sky.coflnet.com. Disable service-upstream so nginx
    # routes directly to pod endpoints and never depends on that map. Safe here:
    # canary trafficRouting is ~ (null), no service mesh, no Service-VIP NetworkPolicies.
    serviceUpstream: false

  # No redpanda volumes yet — secrets/configmaps not created on talos.
  volumes:
    - mountName: openbao-ca
      mountPath: /openbao/tls
      name: openbao-ca
      type: configmap
    - mountName: redpanda-secret
      mountPath: /tls/secret
      name: redpanda
      type: secret
    - mountName: redpanda-cm
      mountPath: /tls/cm
      name: redpanda
      type: configmap

  # Cilium-backed ClusterIP Services + EndpointSlices for MariaDB.
  # Replaces the eu-cluster HAProxy (proxy namespace) which doesn't exist on talos.
  # Cilium eBPF handles load balancing between the backend IPs with sub-μs latency.
  databaseServices:
    enabled: true
    skyDatabaseEndpoints:
      - "185.203.217.119"
      - "194.163.151.190"
    itemsDatabaseEndpoints:
      - "185.203.217.119"
      - "194.163.151.190"

  # Self-healing for the Cilium EndpointSlice->eBPF desync bug (1.19.x) that
  # leaves ClusterIP services with zero backends -> 502s. A CronJob probes every
  # ClusterIP VIP once a minute and bumps the EndpointSlice annotation to force
  # an agent resync when a VIP with ready endpoints is unreachable.
  # See templates/cilium-endpointslice-healer.yaml. Talos-only (Cilium CNI).
  ciliumEndpointSliceHealer:
    enabled: true
    schedule: "* * * * *"
    probeTimeoutSeconds: 1

  # Talos OpenBao uses TLS.
  openbaoAddr: https://openbao.openbao.svc:8200
  # Authenticate against the dedicated secrets cluster without giving OpenBao
  # token-review access to this cluster's Kubernetes API.
  openbaoAuthPath: jwt-talos-eu
  openbaoTLSServerName: openbao.openbao.svc.cluster.local

  # OpenBao CA certificate for TLS validation (self-signed, not in system trust store).
  # Mounted as ConfigMap → /openbao/tls/ca.crt → OPENBAO__CACERT env var.
  openbaoCACert: |
    -----BEGIN CERTIFICATE-----
    MIIBbTCCARSgAwIBAgIUFjyDQv3FGn29svU0l0fMAYJW77kwCgYIKoZIzj0EAwIw
    FTETMBEGA1UEAxMKb3BlbmJhby1jYTAeFw0yNjA1MzAwNjMwMDdaFw0zNjA1Mjcw
    NjMwMDdaMBUxEzARBgNVBAMTCm9wZW5iYW8tY2EwWTATBgcqhkjOPQIBBggqhkjO
    PQMBBwNCAATP+OVpqk8lnHealoOSbRZpInlL4ypSkvSCR0ksELx2Xg/eJJY3y9gj
    tRrEp6OXd24Wwoy2L4V74FkfO+dkfUTko0IwQDAOBgNVHQ8BAf8EBAMCAqQwDwYD
    VR0TAQH/BAUwAwEB/zAdBgNVHQ4EFgQUTs+GuzkdJhBXyXXlwZI7Mn3pr8gwCgYI
    KoZIzj0EAwIDRwAwRAIgA1l0MK0v3oIhoVgys1U/jdVZig/jp/SMhGJTilO25FkC
    IDcNtGjLm4jxvXj9MrrNBwICv2XvSscsE/nc8Je3zE8D
    -----END CERTIFICATE-----

  # Keep global.secret / global.config disabled; secrets are created externally,
  # not by the chart template.
  secret:
    enabled: false
  config:
    enabled: false

  # Override env vars: remove references to secrets that don't exist on talos yet.
  # Redpanda/Kafka env vars will be added once the redpanda/redpanda-credentials
  # secrets and the redpanda configmap are created.
  envVars:
    - name: RATE_LIMITER_REDIS_HOST
      value: sky-global-redis
    - name: SETTINGS_REDIS_HOST
      value: sky-settings-redis
    - name: EVENTS_REDIS_HOST
      value: sky-event-broker-redis
    - name: JAEGER_AGENT_HOST
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
    - name: OTEL_EXPORTER_JAEGER_AGENT_HOST
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
    - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
      value: "http://jaeger-collector.observability:4317"
    # Logs go to Loki via its native OTLP endpoint (Loki 3.x). The OTLP HttpProtobuf
    # exporter sends to the URL as-is, so the full signal path /otlp/v1/logs is required.
    # Targets the write component (distributor) directly; bypasses the single-replica gateway.
    - name: OTEL_EXPORTER_OTLP_LOGS_ENDPOINT
      value: "http://loki-scalable-write.loki:3100/otlp/v1/logs"
    # Kafka mTLS: TLS cert paths (mounted from redpanda secret+configmap).
    # Brokers/credentials are in OpenBao AND as k8s secret refs for early Kafka init.
    - name: KAFKA__TLS__CA_LOCATION
      value: /tls/cm/ca.crt
    - name: KAFKA__TLS__CERTIFICATE_LOCATION
      value: /tls/cm/skyblock.crt
    - name: KAFKA__TLS__KEY_LOCATION
      value: /tls/secret/skyblock.key
    - name: KAFKA__BROKERS
      valueFrom:
        secretKeyRef:
          name: redpanda
          key: brokers
    - name: KAFKA__USERNAME
      valueFrom:
        secretKeyRef:
          name: redpanda-credentials
          key: username
    - name: KAFKA__PASSWORD
      valueFrom:
        secretKeyRef:
          name: redpanda-credentials
          key: password
    - name: KAFKA__REPLICATION_FACTOR
      value: "3"

    ## base urls for service-to-service communication ##
    - name: API_BASE_URL
      value: http://sky-api:8000
    - name: BAZAAR_BASE_URL
      value: http://sky-bazaar:8000
    - name: BAZAARFLIPPER_BASE_URL
      value: http://sky-bazaar-flipper:8000
    - name: ITEMS_BASE_URL
      value: http://sky-items:8000
    - name: MAYOR_BASE_URL
      value: http://sky-mayor:8080
    - name: PLAYERNAME_BASE_URL
      value: http://sky-player-name:8000
    - name: PLAYERNAME_URL
      value: http://sky-player-name:8000
    - name: REFERRAL_BASE_URL
      value: http://sky-referral:8000
    - name: SETTINGS_BASE_URL
      value: http://sky-settings:8000
    - name: SNIPER_BASE_URL
      value: http://sky-sniper:8000
    - name: INDEXER_BASE_URL
      value: http://sky-indexer:8000
    - name: SUBSCRIPTION_BASE_URL
      value: http://sky-subscriptions:8000
    - name: SKYFLIPPER_BASE_URL
      value: http://sky-flipper:8000
    - name: SKYCOMMANDS_BASE_URL
      value: http://sky-commands:8008
    - name: MOD_BASE_URL
      value: http://sky-mod-commands:8000
    - name: PAYMENTS_BASE_URL
      value: http://sky-payments.payment:8000
    - name: PROFILE_BASE_URL
      value: http://sky-profiles:8000
    - name: PLAYERSTATE_BASE_URL
      value: http://sky-player-state:8000
    - name: CRAFTS_BASE_URL
      value: http://sky-crafts:8000
    - name: UPDATER_BASE_URL
      value: http://sky-updater:8000
    - name: MCCONNECT_BASE_URL
      value: http://sky-mc-connect:8000
    - name: FLIPTRACKER_BASE_URL
      value: http://sky-flip-tracker:8000
    - name: CHAT_BASE_URL
      value: http://sky-chat:8000
    - name: PROXY_BASE_URL
      value: http://sky-proxy:8000
    - name: LEADERBOARD_BASE_URL
      value: http://leaderboard:8000
    - name: EVENTS_BASE_URL
      value: http://sky-event-broker:8000
    - name: TRADE_BASE_URL
      value: http://sky-trade:8000
    - name: AUCTIONS_BASE_URL
      value: http://sky-auctions:8000

  frontendEnvVars: []
  minioEnvVars:
    - name: MINIO_HOST
      valueFrom:
        configMapKeyRef:
          key: host
          name: minio
    - name: MINIO_SECRET
      valueFrom:
        secretKeyRef:
          key: secret_key
          name: minio
    - name: MINIO_KEY
      valueFrom:
        secretKeyRef:
          key: access_key
          name: minio
  kafkaTopics: []

# ─── Sub-charts: all disabled initially ──────────────────────────────────────
# Enable one by one once the relevant secrets exist and connectivity is verified.

sky-api:
  enabled: true
  # JWT signing material is mandatory in production.  A pod must not become
  # Ready and serve only 401s when OpenBao authentication or loading fails.
  openbaoOptional: false
  opensearchCACert: |
    -----BEGIN CERTIFICATE-----
    MIIFBzCCAu+gAwIBAgIRALx0/ofkuTSCmIGLk+8jMwQwDQYJKoZIhvcNAQELBQAw
