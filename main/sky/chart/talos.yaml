  serviceMonitor:
    enabled: true
  envVars:
    - name: DONUT_API_BASE_URL
      value: "http://donutapi.donut.svc.cluster.local:8000"
    - name: DEEPSEEK_MODEL
      value: "deepseek-v4-flash"
    - name: DEEPSEEK_THINKING
      value: "true"
    - name: DEEPSEEK_MAX_TOKENS
      value: "4096"
    - name: EMBEDDING_API_URL
      value: "http://skycofl-embeddings.sky.svc.cluster.local:8080/v1/embeddings"
    - name: EMBEDDING_MODEL
      value: "BAAI/bge-small-en-v1.5"
    - name: EMBEDDING_DIMENSIONS
      value: "384"
    - name: EMBEDDING_BATCH_SIZE
      value: "32"
    - name: AI_CONVERSATION_TTL_HOURS
      value: "24"
    - name: OPENSEARCH_CA_CERT_PATH
      value: "/etc/sky-api/opensearch-ca.crt"
    - name: DBCONNECTION
      valueFrom:
        secretKeyRef:
          name: sky-api-db
          key: connection
    # Whitelist IPv4 loopback so `kubectl port-forward` sessions (which the pod
    # sees as source 127.0.0.1) are exempt from rate limiting, just like in-cluster
    # pod traffic (10.0.0.0/8). appsettings.json already lists ::1/10 but the IPv4
    # loopback range was missing, so local debugging against a forwarded sky-api
    # got rate-limited/blocked. Appends index 4 to IpRateLimiting:IpWhitelist
    # (indices 0-3 are defined in appsettings.json).
    - name: IpRateLimiting__IpWhitelist__4
      value: "127.0.0.0/8"
  livenessProbe:
    initialDelaySeconds: 30
  readinessProbe:
    initialDelaySeconds: 30
  canary:
    steps:
      - setWeight: 10
      - pause:
          duration: 3m
      - analysis:
          templates:
            - templateName: sky-api
          args:
            - name: service-name
              value: sky-api-canary-service
            - name: pod-hash
              valueFrom:
                podTemplateHashValue: Latest
      - setWeight: 50
      - pause:
          duration: 5m
      - analysis:
          templates:
            - templateName: sky-api
          args:
            - name: service-name
              value: sky-api-canary-service
            - name: pod-hash
              valueFrom:
                podTemplateHashValue: Latest
      - setWeight: 100
      - pause:
          duration: 5m
    maxUnavailable: 1
    canaryService: sky-api-canary-service
    stableService: sky-api-stable-service
    trafficRouting: ~

sky-auctions:
  enabled: true
  serviceMonitor:
    enabled: false
  envVars:
    - name: S3__BUCKET_NAME
      value: "sky-auctions-archive"
    - name: S3__ENABLED
      value: "true"
    - name: CASSANDRA__HOSTS
      valueFrom:
        configMapKeyRef:
          name: scylla-config
          key: scylla_host
    - name: CASSANDRA__USER
      valueFrom:
        configMapKeyRef:
          name: scylla-config
          key: auctions_username
    - name: CASSANDRA__PASSWORD
      valueFrom:
        secretKeyRef:
          name: scylla-credentials
          key: auctions-password
    - name: CASSANDRA__X509Certificate_PATHS
      value: /tls/scylla/secret/db.pfx
    - name: CASSANDRA__X509Certificate_PASSWORD
      valueFrom:
        secretKeyRef:
          name: scylla-credentials
          key: db-pfx-password
  livenessProbe:
    initialDelaySeconds: 90
  readinessProbe:
    initialDelaySeconds: 90

sky-bazaar:
  enabled: true
  serviceMonitor:
    enabled: false
  envVars:
    - name: KAFKA__CONSUMER_GROUP
      value: "sky-bazaar-talos"
    - name: CASSANDRA__HOSTS
      valueFrom:
        configMapKeyRef:
          name: scylla-config
          key: scylla_host
    - name: CASSANDRA__USER
      valueFrom:
        configMapKeyRef:
          name: scylla-config
          key: scylla_bazaar_user
    - name: CASSANDRA__X509Certificate_PATHS
      value: /tls/scylla/secret/db.pfx
    - name: CASSANDRA__KEYSPACE
      value: "bazaar_quickstatus"
  livenessProbe:
    initialDelaySeconds: 180
  readinessProbe:
    initialDelaySeconds: 90

sky-bazaar-flipper:
  enabled: true
  serviceMonitor:
    enabled: false
  envVars: []
  livenessProbe:
    initialDelaySeconds: 90
  readinessProbe:
    initialDelaySeconds: 90

sky-bfcs:
  enabled: true
  externalMinio: true
  # sky-bfcs is only a secondary instance on talos-eu, so trim its CPU request here.
  # The 1400m subchart default stays for the non-eu clusters where sky-bfcs is the
  # primary, time-critical workload (brief spikes, must not be starved).
  resources:
    requests:
      cpu: 400m
  envVars:
    - name: REDIS_HOST
      value: sky-bfcs-redis,syncTimeout=1000
    - name: SNIPER_TRANSFER_TOKEN
      valueFrom:
        secretKeyRef:
          name: sky-bfcs-secrets
          key: sniper_transfer_token
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: sky-bfcs-secrets
          key: jwt_secret
  livenessProbe:
    initialDelaySeconds: 90
  readinessProbe:
    initialDelaySeconds: 90
  # The root CA trust bundle ConfigMap (sky-bfcs-redis-root-cas) is created
  # by the chart from files/redis-mtls/root-ca-*.crt — deployed automatically.
  redis: {}

sky-chat:
  enabled: true
  serviceMonitor:
    enabled: false
  envVars:
    - name: REDIS_HOST
      value: "sky-settings-redis"
  livenessProbe:
    initialDelaySeconds: 90
  readinessProbe:
    initialDelaySeconds: 90

sky-commands:
  enabled: true
  serviceMonitor:
    enabled: true
  envVars: []
  livenessProbe:
    initialDelaySeconds: 90
  readinessProbe:
    initialDelaySeconds: 90
  canary:
    trafficRouting: ~

sky-controller:
  enabled: false

sky-crafts:
  enabled: true
  serviceMonitor:
    enabled: false
  envVars: []
  livenessProbe:
    initialDelaySeconds: 120
  readinessProbe:
    initialDelaySeconds: 120

sky-event-broker:
  enabled: true

sky-flipper:
  enabled: true
  serviceMonitor:
    enabled: false
  envVars:
    - name: REDIS_HOST
      value: "redis-service"
    - name: DBConnection
      valueFrom:
        secretKeyRef:
          name: sky-flipper-db
          key: connection
  livenessProbe:
    initialDelaySeconds: 90
  readinessProbe:
    initialDelaySeconds: 90

sky-flip-tracker:
  enabled: true
  serviceMonitor:
    enabled: false
  # OpenBao disabled — app image does not support OPENBAO__CACERT for TLS.
  # All creds provided via k8s secrets/env vars directly.
  openbao:
    enabled: false
  envVars:
    - name: REDIS_HOST
      value: "sky-global-redis"
    - name: DB_CONNECTION
      valueFrom:
        secretKeyRef:
          name: flip-tracker-db
          key: connection
    - name: CASSANDRA__HOSTS
      valueFrom:
        configMapKeyRef:
          name: scylla-config
          key: scylla_host
    - name: CASSANDRA__USER
      valueFrom:
        configMapKeyRef:
          name: scylla-config
          key: tracker_user
    - name: CASSANDRA__PASSWORD
      valueFrom:
        secretKeyRef:
          name: scylla-credentials
          key: tracker_password
    - name: CASSANDRA__KEYSPACE
      value: "flips"
    - name: CASSANDRA__X509Certificate_PATHS
      value: /tls/scylla/secret/db.pfx
    - name: CASSANDRA__X509Certificate_PASSWORD
      valueFrom:
        secretKeyRef:
          name: scylla-credentials
          key: db-pfx-password
  livenessProbe:
    initialDelaySeconds: 90
  readinessProbe:
    initialDelaySeconds: 90

sky-indexer:
  enabled: true
  serviceMonitor:
    enabled: false
  envVars:
    - name: DBConnection
      valueFrom:
        secretKeyRef:
          name: sky-indexer-db
