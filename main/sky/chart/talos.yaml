    - name: CASSANDRA__USER
      valueFrom:
        configMapKeyRef:
          name: scylla-config
          key: scylla_mod_user
    - name: CASSANDRA__PASSWORD
      valueFrom:
        secretKeyRef:
          name: scylla-credentials
          key: mod_password
    - name: CASSANDRA__KEYSPACE
