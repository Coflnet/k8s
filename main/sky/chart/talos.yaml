      valueFrom:
        secretKeyRef:
          name: sky-mc-connect-db
          key: connection
  livenessProbe:
    initialDelaySeconds: 90
  readinessProbe:
    initialDelaySeconds: 90

sky-mod-commands:
  enabled: true
  # NOTE: Requires scylla-pfx k8s Secret and scylla-credentials Secret
  # to exist in the sky namespace on talos for ScyllaDB mTLS.
  # Also requires scylla-config ConfigMap for ScyllaDB host/user config.
