        secretKeyRef:
          name: sky-mayor-db
          key: mongo_url
    - name: CASSANDRA__HOSTS
      valueFrom:
        configMapKeyRef:
          name: scylla-config
          key: scylla_host
    - name: CASSANDRA__KEYSPACE
      value: "sky_mayor"
    - name: CASSANDRA__USER
      valueFrom:
        configMapKeyRef:
          name: scylla-config
          key: scylla_mayor_user
    - name: CASSANDRA__PASSWORD
      valueFrom:
        secretKeyRef:
          name: scylla-credentials
          key: mayor_password
    - name: CASSANDRA__X509Certificate_PATHS
      value: /tls/scylla/secret/db.pfx
    - name: CASSANDRA__X509Certificate_PASSWORD
      valueFrom:
        secretKeyRef:
          name: scylla-credentials
          key: db-pfx-password
  livenessProbe:
    initialDelaySeconds: 90
  readinessProbe:
    initialDelaySeconds: 90

sky-mc-connect:
  enabled: true
  serviceMonitor:
    enabled: false
  envVars:
    - name: DB_CONNECTION
      valueFrom:
        secretKeyRef:
          name: sky-mc-connect-db
          key: connection
  livenessProbe:
    initialDelaySeconds: 90
  readinessProbe:
    initialDelaySeconds: 90

sky-mod-commands:
  enabled: true
  # NOTE: Requires scylla-pfx k8s Secret and scylla-credentials Secret
  # to exist in the sky namespace on talos for ScyllaDB mTLS.
  # Also requires scylla-config ConfigMap for ScyllaDB host/user config.
  serviceMonitor:
    enabled: true
  envVars:
    # HypixelContext is also constructed directly by UserService and therefore
    # reads this OS environment variable instead of IConfiguration/OpenBao.
    - name: DBConnection
      valueFrom:
        secretKeyRef:
          name: secret
          key: connection_read_api
    - name: CHAT_API_KEY
      valueFrom:
        secretKeyRef:
          name: secret
          key: mod_chat_api_key
    - name: VPS__SECRET
      valueFrom:
        secretKeyRef:
          name: secret
          key: vps_secret
    # Cloudfanatic (US) Redis for cross-cluster flip pub/sub.
    # Password from redis-password secret on cloudfanatic, synced to redis-cloudfanatic secret here.
    - name: REDIS_FLIP_INSTANCES__2
      valueFrom:
        secretKeyRef:
          name: redis-cloudfanatic
          key: connection
    # Talos Linode Redis for cross-cluster flip pub/sub.
    # Password from redis-password secret on talos-linode, synced to redis-talos-linode secret here.
    - name: REDIS_FLIP_INSTANCES__3
      valueFrom:
        secretKeyRef:
          name: redis-talos-linode
          key: connection
  livenessProbe:
    initialDelaySeconds: 90
  readinessProbe:
    initialDelaySeconds: 90
  canary:
    trafficRouting: ~

sky-player-name:
  enabled: true
  # Reads DBConnection from OpenBao kv/sky/sky-player-name.
  envVars: []
  livenessProbe:
    initialDelaySeconds: 90
  readinessProbe:
    initialDelaySeconds: 90

sky-player-state:
  enabled: true
  # NOTE: Requires scylla-pfx k8s Secret to exist in the sky namespace on talos
  # for ScyllaDB mTLS (mounted directly by deployment template).
  # Also requires scylla-credentials Secret and scylla-config ConfigMap.
  # DB connection strings and passwords come from OpenBao kv/sky/sky-player-state.
  envVars:
    - name: SCYLLA__HOSTS
      valueFrom:
        configMapKeyRef:
          name: scylla-config
          key: scylla_host
    - name: SCYLLA__USER
      valueFrom:
        configMapKeyRef:
          name: scylla-config
          key: player_state_user
    - name: SCYLLA__X509Certificate_PATHS
      value: /tls/scylla/secret/db.pfx
    - name: SCYLLA__X509Certificate_PASSWORD
      valueFrom:
        secretKeyRef:
          name: scylla-credentials
          key: db-pfx-password
  livenessProbe:
    initialDelaySeconds: 15
  readinessProbe:
    initialDelaySeconds: 10

sky-profiles:
