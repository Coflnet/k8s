apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: ci-update-static-webhook
  namespace: argo-events
spec:
  template:
    serviceAccountName: argo-events-sa
  dependencies:
  - name: static-update
    eventSourceName: ci-eventsource
    eventName: static-update
    filters: 
      data:
      - path: body.ref
        type: string
        value:
          - refs/heads/main
      - path: body.repository.owner.name
        type: string
        value:
          - Coflnet
      - path: body.repository.owner.login
        type: string
        value:
          - Coflnet
  triggers:
  - template:
      name: trigger
      argoWorkflow:
        group: argoproj.io
        version: v1alpha1
        resource: workflows
        operation: submit
        parameters:
          - src: 
              dependencyName: static-update
              dataKey: body.repository.git_url
            dest: spec.arguments.parameters.0.value
          - src: 
              dependencyName: static-update
              dataKey: body.repository.default_branch
            dest: spec.arguments.parameters.1.value
          - src: 
              dependencyName: static-update
              dataKey: body.repository.default_branch
              dataTemplate: "{{"{{"}} .Input.body.repository.full_name | nospace | lower {{"}}"}}"
            dest: spec.arguments.parameters.2.value
            operation: append
          - src:
              dependencyName: static-update
              dataTemplate: "{{"{{"}} .Input.body.repository.name | nospace | lower {{"}}"}}"
            dest: metadata.generateName
            operation: append
        source:
          resource:
            apiVersion: argoproj.io/v1alpha1
            kind: Workflow
            metadata:
              namespace: argo
              generateName: ci-update-
              labels:
                security.coflnet.com/k8s-api-access: "false"
            spec:
              workflowTemplateRef:
                name: ci-image-pipeline
              entrypoint: build-only
              arguments:
                parameters:
                  - { name: app_repo, value: "" }
                  - { name: branch, value: "" }
                  - { name: container_image, value: "" }
                  - { name: container_tag, value: "latest" }
                  - { name: sub_path, value: "." }
                  - { name: git_user, value: "Flou21" }
                  - { name: k8s_file, value: "" }
                  - { name: repo_url, value: "https://github.com/Coflnet/k8s" }
                  - { name: pipeline_start, value: "{{"{{"}}workflow.creationTimestamp.RFC3339{{"}}"}}" }