replicaCount: 1
strategy: RollingUpdate

imagePullSecrets: 
- name: harbor

serviceAccount:
  name: static-s3

openbao:
  addr: http://openbao.openbao.svc:8200
  mount: kv
  path: services/static-s3
  role: static-s3

image:
  repository: muehlhansfl/statics3
  tag: 8b8f8110-dc77-4809-9b0b-66495eda7cfb
  pullPolicy: IfNotPresent

ports:
  - name: api
    containerPort: 8000

resources: 
  requests:
    cpu: 50m
    memory: 200Mi


serivcePorts:
  - name: api
    port: 8000
    targetPort: 8000


s3:
  host: eu2.contabostorage.com
  bucket: static

envVars: 
  - name: OPENBAO__ENABLED
    value: "true"
  - name: OPENBAO__OPTIONAL
    value: "false"
  - name: OPENBAO__ADDR
    value: http://openbao.openbao.svc:8200
  - name: OPENBAO__MOUNT
    value: kv
  - name: OPENBAO__PATH
    value: services/static-s3
  - name: OPENBAO__ROLE
    value: static-s3

ingress:
  - host: static.coflnet.com
    http:
      paths:
      - pathType: ImplementationSpecific
        path: "/"
        backend:
          service:
            name: static-s3
            port:
              number: 8000
