apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: indexer-claim-many
  namespace: sky
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: indexer-claim-migration
  namespace: sky
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi

