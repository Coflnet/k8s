apiVersion: apps/v1
kind: Deployment
metadata:
  name: light-client
  namespace: sky
  labels:
    app: light-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: light-client
  template:
    metadata:
      labels:
        app: light-client
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
      - name: light-client
        image: registry.flou21.de/sky:3896b696-e9a2-4c72-8454-32f608c7ac36
        ports:
          - containerPort: 8008
        env:
          - name: DBConnection
            valueFrom:
              secretKeyRef:
                key: connection
                name: secret
          - name: redisCon
            value: redis-service
          - name: MODE
            value: light
        resources:
          requests:
            memory: "3000Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /item/ASPECT_OF_THE_END
            port: 8008
          initialDelaySeconds: 20
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: light-client-service
  namespace: sky
spec:
  selector:
    app: light-client
  ports:
    - port: 8008
      targetPort: 8008