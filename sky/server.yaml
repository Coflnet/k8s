apiVersion: apps/v1
kind: Deployment
metadata:
  name: light-client
  namespace: sky
  labels:
    app: light-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: light-client
  template:
    metadata:
      labels:
        app: light-client
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
      - name: light-client
        image: registry.flou21.de/sky:8ef3122d-fb1b-4699-8da1-3bbf3d6be97e
        ports:
          - containerPort: 8008
        env:
          - name: DBConnection
            valueFrom:
              secretKeyRef:
                key: connection
                name: secret
          - name: redisCon
            value: redis-service
          - name: MODE
            value: light
        resources:
          requests:
            memory: "3000Mi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: light-client-service
  namespace: sky
spec:
  selector:
    app: light-client
  ports:
    - port: 8008
      targetPort: 8008