apiVersion: apps/v1
kind: Deployment
metadata:
  name: light-client
  namespace: sky
  labels:
    app: light-client
spec:
  replicas: 3
  selector:
    matchLabels:
      app: light-client
  template:
    metadata:
      labels:
        app: light-client
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
      - name: light-client
        image: registry.flou21.de/sky:4c93ac71-eb3b-4883-9adb-ceb77d2e7a4c
        ports:
          - containerPort: 8008
        env:
          - name: DBConnection
            valueFrom:
              secretKeyRef:
                key: connection
                name: secret
          - name: redisCon
            value: redis-service
          - name: MODE
            value: light
        resources:
          requests:
            memory: "1000Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8008
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: light-client-service
  namespace: sky
spec:
  selector:
    app: light-client
  ports:
    - port: 8008
      targetPort: 8008
