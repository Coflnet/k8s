apiVersion: apps/v1
kind: Deployment
metadata:
  name: pr-env-sky-354
  namespace: sky
  labels:
    app: pr-env-sky-354
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pr-env-sky-354
  template:
    metadata:
      labels:
        app: pr-env-sky-354
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
      - name: pr-env-sky-354
        image: registry.flou21.de/sky:354
        imagePullPolicy: Always
        ports:
          - containerPort: 80
        resources:
          requests:
            memory: 100Mi
            cpu: 100m
---
apiVersion: v1
kind: Service
metadata:
  name: pr-env-sky-354-service
  namespace: sky
spec:
  selector:
    app: pr-env-sky-354
  ports:
    - port: 8008
      targetPort: 80
---
apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: pr-env-sky-354-ingress
  namespace: sky
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: pr-env-sky-354.flou21.de
    http:
      paths:
      - path: /
        backend:
          serviceName: pr-env-sky-354-service
          servicePort: 8008
