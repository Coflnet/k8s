apiVersion: apps/v1
kind: Deployment
metadata:
  name: indexer-migration
  namespace: sky
  labels:
    app: indexer-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: indexer-migration
  template:
    metadata:
      labels:
        app: indexer-migration
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
      - name: indexer-migration
        image: registry.flou21.de/sky:af6a5953-16c6-4076-90c4-6aae3437d4cb
        ports:
          - containerPort: 8008
        env:
          - name: redisCon
            value: redis-service
          - name: apiKey
            valueFrom:
              secretKeyRef:
                key: api
                name: secret
          - name: DBConnection
            valueFrom:
              secretKeyRef:
                key: connection_live
                name: secret
          - name: MODE
            value: indexer
          - name: stripeKey
            valueFrom:
              secretKeyRef:
                key: stripe_key
                name: secret
          - name: stripeSecret
            valueFrom:
              secretKeyRef:
                key: stripe_secret
                name: secret
          - name: firebaseKey
            valueFrom:
              secretKeyRef:
                key: firebase_key
                name: secret
          - name: firebaseSenderId
            valueFrom:
              secretKeyRef:
                key: firebase_sender_id
                name: secret
          - name: PAYPAL_ID
            valueFrom:
              secretKeyRef:
                key: paypal_id
                name: secret
          - name: PAYPAL_SECRET
            valueFrom:
              secretKeyRef:
                key: paypal_secret
                name: secret
        resources:
          requests:
            memory: "3000Mi"
            cpu: "2000m"
        volumeMounts:
          - mountPath: /data
            name: indexer-mount-migration
            subPath: data
      volumes:
        - name: indexer-mount-migration
          persistentVolumeClaim:
            claimName: indexer-claim-migration
---
apiVersion: v1
kind: Service
metadata:
  name: indexer-migration-service
  namespace: sky
spec:
  selector:
    app: indexer-migration
  ports:
    - port: 8008
      targetPort: 8008