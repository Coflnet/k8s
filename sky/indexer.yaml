apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: indexer
  namespace: sky
  labels:
    app: indexer
spec:
  replicas: 1
  serviceName: indexer-service
  selector:
    matchLabels:
      app: indexer
  template:
    metadata:
      labels:
        app: indexer
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
      - name: indexer
        image: registry.flou21.de/sky:aa2b36af-fa6c-4cd0-9c33-d4a0d10b63c7
        ports:
          - containerPort: 8008
        env:
          - name: DBConnection
            valueFrom:
              secretKeyRef:
                key: connection
                name: secret
          - name: apiKey
            valueFrom:
              secretKeyRef:
                key: api
                name: secret
          - name: redisCon
            value: redis-service
          - name: MODE
            value: indexer
        resources:
          requests:
            memory: "3000Mi"
            cpu: "2000m"
        volumeMounts:
          - mountPath: /data
            name: indexer-mount
            subPath: data
      volumes:
        - name: indexer-mount
          persistentVolumeClaim:
            claimName: indexer-claim
---
apiVersion: v1
kind: Service
metadata:
  name: indexer-service
  namespace: sky
spec:
  selector:
    app: indexer
  ports:
    - port: 8008
      targetPort: 8008