apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: sky-ingress
  namespace: sky
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: sky.flou21.de
    http:
      paths:
      - path: /
        backend:
          serviceName: sky-service
          servicePort: 8080

