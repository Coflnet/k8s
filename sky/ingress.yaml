apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: sky-ingress
  namespace: sky
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: adminer-sky.flou21.de
    http:
      paths:
      - path: /
        backend:
          serviceName: adminer-service
          servicePort: 8080
  - host: sky.coflnet.com
    http:
      paths:
      - path: /
        backend:
          serviceName: light-client-service
          servicePort: 3306
  - host: skyblock.coflnet.com
    http:
      paths:
      - path: /
        backend:
          serviceName: light-client-service
          servicePort: 3306

