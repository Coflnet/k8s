apiVersion: apps/v1
kind: Deployment
metadata:
  name: elastic
  namespace: elastic
  labels:
    app: elastic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elastic
  template:
    metadata:
      labels:
        app: elastic
    spec:
      containers:
      - name: elastic
        image: docker.elastic.co/elasticsearch/elasticsearch:7.13.2
        ports:
          - containerPort: 9300
          - containerPort: 9200
        env:
          - name: discovery.type
            value: single-node
        resources:
          requests:
            memory: "1000Mi"
            cpu: "800m"
---
apiVersion: v1
kind: Service
metadata:
  name: elastic-service
  namespace: elastic
spec:
  selector:
    app: elastic
  ports:
    - port: 9300
      targetPort: 9300 
      name: '9300'
    - port: 9200
      targetPort: 9200
      name: '9200'
