apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elastic-ingress
  namespace: elastic-system
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: kibana.flou21.de
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service: 
            name: quickstart-kb-http
            port: 
              number: 5601