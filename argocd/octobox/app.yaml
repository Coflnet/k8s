apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: octobox
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Coflnet/k8s.git
    targetRevision: HEAD
    path: octobox
  destination:
    server: https://kubernetes.default.svc
    namespace: octobox
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
