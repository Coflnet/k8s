apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-except-helm
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Coflnet/k8s.git
    targetRevision: HEAD
    path: kafka
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      selfHeal: true