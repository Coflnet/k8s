apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: ingress
  namespace: odoo 
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: odoo.flou21.de
    http:
      paths:
      - path: /
        backend:
          serviceName: odoo
          servicePort: 80